<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f6fb2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RutaRapida">
<title>Planificador de Rutas de Reparto</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%231f6fb2' d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z'/><path fill='%23fff' d='M11 13.5v-3H9l4-6.5v4.5h2l-4 5z'/></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:#1f6fb2; --blue-2:#2c8fd6; --blue-light:#e8f2fb; --blue-dark:#0c447c;
    --green:#0f9d6f; --green-deep:#0c7a57; --green-light:#e2f7ef;
    --ink:#14223a; --text:#1b2942; --text-muted:#5b6b86; --text-hint:#98a4b8;
    --bg:#eef2f7; --bg-2:#f6f9fc; --surface:#ffffff;
    --line:rgba(20,34,58,.10); --line-strong:rgba(20,34,58,.18);
    --danger:#e1483c; --danger-light:#fdecea;
    --toast-bg:#14223a; --topbar-bg:rgba(255,255,255,.78);
    --radius:16px; --radius-md:12px; --radius-sm:9px;
    --display:'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 12px 30px -16px rgba(16,40,80,.28);
    --shadow-lg:0 20px 50px -24px rgba(16,40,80,.45);
  }

  html[data-theme="dark"] {
    --blue:#3b8fd6; --blue-2:#4aa3e8; --blue-light:rgba(74,163,232,.16); --blue-dark:#8cc6ff;
    --green:#19b083; --green-deep:#149a72; --green-light:rgba(25,176,131,.16);
    --ink:#eef2f8; --text:#dde4ee; --text-muted:#9aa7ba; --text-hint:#6b7889;
    --bg:#0e131b; --bg-2:#141b25; --surface:#1b2330;
    --line:rgba(255,255,255,.09); --line-strong:rgba(255,255,255,.17);
    --danger:#f0675b; --danger-light:rgba(240,103,91,.16);
    --toast-bg:#2a3645; --topbar-bg:rgba(20,27,38,.82);
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 30px -16px rgba(0,0,0,.6);
    --shadow-lg:0 20px 50px -24px rgba(0,0,0,.7);
  }

  body {
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
    overflow-x:clip;   /* nada puede ensanchar la página más que la pantalla */
    background:
      radial-gradient(1100px 480px at 80% -10%, rgba(44,143,214,.16), transparent 60%),
      radial-gradient(900px 420px at 6% 0%, rgba(15,157,111,.12), transparent 55%),
      linear-gradient(180deg, var(--bg-2), var(--bg));
    background-attachment:fixed;
  }

  .topbar { backdrop-filter:saturate(1.4) blur(8px); background:var(--topbar-bg); border-bottom:1px solid var(--line); padding:13px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
  .topbar-icon { width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .topbar-icon svg { width:30px; height:30px; }
  .topbar-icon .pin { fill:var(--blue); }
  .topbar-icon .bolt { fill:#fff; }
  .wordmark { font-family:var(--display); font-size:18px; font-weight:700; letter-spacing:-.03em; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .wordmark .accent { color:var(--blue); }
  .pill { font-size:10px; font-weight:700; letter-spacing:.06em; color:var(--blue-dark); background:var(--blue-light); padding:3px 8px; border-radius:999px; }
  .topbar-sub { font-size:13px; color:var(--text-muted); margin-left:auto; font-weight:500; }

  .layout { padding:16px 16px 8px; display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:720px){ .layout{ grid-template-columns:1fr; } .topbar-sub{ display:none; } }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); min-width:0; }
  .card-head { display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-bottom:12px; }
  .reset-icon { display:inline-flex; align-items:center; gap:6px; padding:6px 11px; font-size:12.5px; font-weight:600; font-family:inherit; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--text-hint); cursor:pointer; transition:.12s; }
  .reset-icon svg { width:15px; height:15px; stroke:currentColor; fill:none; }
  .reset-icon:hover { color:var(--danger); border-color:var(--danger); background:var(--danger-light); }
  .card-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--text-muted); }

  .ac-wrap { position:relative; flex:1; min-width:0; }
  .stop-num { flex:0 0 56px; width:56px !important; text-align:center; padding-left:6px !important; padding-right:6px !important; }
  .remove-spacer { width:30px; flex:0 0 30px; }
  /* Parada ya escrita: se muestra compacta con la dirección completa (se puede
     tocar para volver a editar). Ahorra altura y no corta el texto. */
  .stop-display { display:none; flex:1; min-width:0; font-size:13.5px; line-height:1.35; padding:8px 12px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); background:var(--surface); color:var(--text); cursor:text; word-break:break-word; }
  .stop-display:hover { border-color:var(--blue); }
  .stop-display .sd-num { font-weight:700; color:var(--blue); }
  .stop-row.filled .ac-wrap, .stop-row.filled .stop-num,
  .origin-row.filled .ac-wrap, .origin-row.filled .stop-num { display:none; }
  .stop-row.filled .stop-display, .origin-row.filled .stop-display { display:block; }
  .ac-dropdown { position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); z-index:200; max-height:min(62vh,440px); overflow-y:auto; display:none; }
  .ac-dropdown.open { display:flex; flex-direction:column; }
  .ac-list { max-height:208px; overflow-y:auto; }
  .ac-preview { border-top:1px solid var(--line); background:var(--bg-2); }
  .ac-preview iframe { display:block; width:100%; height:128px; border:0; }
  .ac-preview .ac-preview-label { font-size:11px; color:var(--text-muted); padding:7px 12px 0; font-weight:500; }
  .ac-item { padding:10px 13px; font-size:13px; color:var(--text); cursor:pointer; border-bottom:1px solid var(--line); line-height:1.35; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover, .ac-item.active { background:var(--blue-light); }
  .ac-item .ac-main { font-weight:600; }
  .ac-item .ac-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
  .ac-hl { font-weight:800; color:var(--blue-dark); }
  .ac-loading, .ac-none { padding:12px; font-size:13px; color:var(--text-hint); text-align:center; }

  .origin-row { display:flex; align-items:center; gap:10px; }
  .origin-icon { width:42px; height:42px; flex-shrink:0; background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--radius-sm); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.12s; }
  .origin-icon:hover { background:var(--blue-light); color:var(--blue); border-color:var(--blue); }
  .origin-icon svg { width:19px; height:19px; stroke:currentColor; fill:none; }
  .origin-icon.locating svg { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .card.editor { position:relative; }
  .opt-overlay { position:fixed; inset:0; z-index:450; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:var(--topbar-bg); backdrop-filter:saturate(1.2) blur(3px); }
  .opt-overlay.show { display:flex; }
  .opt-spinner { width:44px; height:44px; border-radius:50%; border:3px solid var(--line-strong); border-top-color:var(--blue); animation:spin .8s linear infinite; }
  .opt-overlay-msg { font-size:14px; font-weight:700; color:var(--text); }
  .badge-home svg { width:15px; height:15px; stroke:var(--green-deep); fill:none; }
  .divider { height:1px; background:var(--line); margin:13px 0; }

  .stop-row { display:flex; align-items:center; gap:12px; margin-top:10px; }
  .stop-row:first-child { margin-top:0; }
  .badge-num { width:28px; height:28px; border-radius:50%; background:var(--surface); border:1.5px solid var(--line-strong); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text-muted); flex-shrink:0; }

  input[type="text"] { width:100%; min-width:0; font-size:14px; padding:11px 13px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); background:var(--surface); color:var(--text); outline:none; font-family:inherit; transition:border-color .15s, box-shadow .15s; }
  input[type="text"]::placeholder { color:var(--text-hint); }
  input[type="text"]:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(31,111,178,.15); }
  input.invalid, input.invalid:focus { border-color:#e0443e; box-shadow:0 0 0 3px rgba(224,68,62,.18); }

  .btn-remove { background:none; border:none; cursor:pointer; color:var(--text-hint); width:30px; height:30px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.12s; }
  .btn-remove:hover { background:var(--danger-light); color:var(--danger); }
  .btn-remove svg { width:15px; height:15px; stroke:currentColor; fill:none; }

  .btn-add { width:100%; margin-top:12px; padding:10px; background:none; border:1.5px dashed var(--line-strong); border-radius:var(--radius-sm); color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; font-family:inherit; transition:.12s; }
  .btn-add:hover { background:var(--bg-2); border-color:var(--blue); color:var(--blue); }
  .btn-add svg { width:15px; height:15px; stroke:currentColor; fill:none; }

  .btn-optimize { width:100%; margin-top:14px; padding:14px; background:linear-gradient(145deg, var(--blue-2), var(--blue)); color:#fff; border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:9px; box-shadow:0 10px 22px -12px rgba(31,111,178,.9); transition:transform .15s, box-shadow .15s; }
  .btn-optimize:hover { transform:translateY(-1px); box-shadow:0 14px 26px -12px rgba(31,111,178,.95); }
  .btn-optimize:active { transform:translateY(0); }
  .btn-optimize:disabled { background:var(--line-strong); color:var(--text-hint); box-shadow:none; cursor:not-allowed; transform:none; }
  .btn-optimize svg { width:17px; height:17px; stroke:currentColor; fill:none; }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .toolbar .origin-icon { width:38px; height:38px; }
  .btn-mini { display:inline-flex; align-items:center; gap:6px; padding:7px 11px; font-size:12.5px; font-weight:600; font-family:inherit; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--text-muted); cursor:pointer; transition:.12s; }
  .btn-mini:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-light); }
  .btn-mini.danger:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-light); }
  .btn-mini svg { width:14px; height:14px; stroke:currentColor; fill:none; }

  .hint-text { display:none; }

  .result-panel { display:none; }
  .result-panel.on { display:block; position:relative; }
  .map-toggle { position:absolute; top:24px; right:24px; z-index:90; width:30px; height:30px; display:flex; align-items:center; justify-content:center; background:var(--surface); color:var(--text-muted); border:1px solid var(--line-strong); border-radius:8px; cursor:pointer; box-shadow:var(--shadow); transition:.15s; }
  .map-toggle:hover { color:var(--blue); border-color:var(--blue); }
  .map-toggle svg { width:16px; height:16px; stroke:currentColor; fill:none; transition:transform .2s; }
  .result-panel.map-min .map-toggle svg { transform:rotate(180deg); }
  .map-toggle-label { display:none; }
  /* Mapa minimizado: el botón deja de flotar y se vuelve una barra "Mostrar mapa"
     en su propio sitio (donde estaba el mapa), sin pisar las pestañas de abajo. */
  .result-panel.map-min .map-toggle { position:static; width:100%; height:auto; padding:10px; margin-bottom:12px; border-radius:var(--radius-sm); gap:8px; font-size:13px; font-weight:600; }
  .result-panel.map-min .map-toggle-label { display:inline; }
  .result-panel.map-min #route-map { height:0 !important; min-height:0; margin-bottom:0; border-width:0; }
  .map-center { right:62px; }
  .result-panel.map-min .map-center { display:none; }

  /* Mapa de vista previa */
  #route-map { height:300px; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--line); margin-bottom:14px; background:var(--bg-2); z-index:0; }
  @media (min-width:900px){ #route-map { height:clamp(220px, 40vh, 460px); } }

  /* ── Navegación inferior (solo móvil) ─────────────────────────────────── */
  .mobilenav { display:none; }
  @media (max-width:720px){
    .mobilenav { display:flex; position:fixed; left:0; right:0; bottom:0; z-index:400; background:var(--surface); border-top:1px solid var(--line); box-shadow:0 -4px 16px rgba(0,0,0,.07); padding:5px 10px calc(5px + env(safe-area-inset-bottom)); gap:8px; }
    .mnav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 0; border:none; background:none; color:var(--text-muted); font-size:11px; font-weight:700; cursor:pointer; border-radius:12px; }
    .mnav-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; }
    .mnav-btn.active { color:var(--blue); background:var(--blue-light); }
    body.mview-edit .result-panel { display:none !important; }
    body.mview-route .card.editor { display:none !important; }
    body.mview-route .next-bar.show { display:flex; position:fixed; left:10px; right:10px; bottom:calc(64px + env(safe-area-inset-bottom)); z-index:380; align-items:center; gap:10px; padding:9px 11px; background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:0 10px 28px -10px rgba(0,0,0,.4); }
  }

  /* ── Vista de escritorio tipo app ─────────────────────────────────────── */
  @media (min-width:1024px){
    /* La app ocupa exactamente el alto disponible (--apptop lo mide el JS).
       Sin scroll de página: cada columna scrollea por dentro. */
    .shell { max-width:none; padding:14px clamp(14px,2vw,32px); height:calc(100vh - var(--apptop,64px)); overflow:hidden; align-items:stretch; gap:14px; }
    .topbar { padding:8px clamp(14px,2vw,32px); }
    .topbar-icon { width:30px; height:30px; }
    .topbar-icon svg { width:26px; height:26px; }
    .wordmark { font-size:16px; }
    .sidebar { position:static; top:auto; height:100%; max-height:none; width:208px; }
    .main { height:100%; min-height:0; }
    .layout { height:100%; min-height:0; align-items:stretch; grid-template-columns:minmax(360px,440px) minmax(0,1fr); grid-template-rows:1fr; gap:14px; padding:0; }

    /* Editor: la lista de paradas scrollea; los controles y el botón optimizar
       se quedan abajo del todo aunque haya pocas paradas (deja sitio al buscador). */
    .card.editor { height:100%; min-height:0; display:flex; flex-direction:column; padding:14px; }
    .card.editor > * { flex-shrink:0; }
    #stops-container { flex:0 1 auto; min-height:40px; overflow-y:auto; overflow-x:hidden; padding-right:4px; }
    .card.editor .couriers-row { margin-top:auto; }   /* empuja repartidores + botón al fondo */

    /* Resultado: mapa fijo arriba; la lista de la ruta scrollea debajo. */
    .result-panel.on { height:100%; min-height:0; position:relative; display:flex; flex-direction:column; padding:14px; }
    #route-map { flex-shrink:0; margin-bottom:10px; }
    #routes-container { flex:1 1 auto; min-height:0; overflow-y:auto; padding-right:4px; }

    /* Compactado para pantallas de portátil (14") */
    .card-head { margin-bottom:8px; }
    .divider { margin:8px 0; }
    .add-row { margin-top:6px; }
    .btn-optimize { margin-top:10px; padding:12px; }
    input[type="text"] { padding:7px 12px; font-size:13.5px; }
    .stop-row { margin-top:6px; }
    .opt-row { padding:6px 2px; }
    .stats { gap:7px; margin-bottom:8px; }
    .stat { padding:5px 5px; }
    .stat-value { font-size:15px; }
    .stat-label { font-size:9px; margin-bottom:1px; }
  }

  /* Add / paste buttons row */
  .add-row { display:flex; gap:8px; margin-top:12px; }
  .add-row .btn-add { flex:1; width:auto; margin-top:0; }
  .btn-add.alt { flex:0 0 auto; width:auto; padding-left:14px; padding-right:14px; }

  /* Sort handle + dragging */
  .sort-handle { background:none; border:none; cursor:grab; color:var(--text-hint); width:30px; height:30px; flex-shrink:0; display:flex; align-items:center; justify-content:center; touch-action:none; align-self:center; }
  .sort-handle:active { cursor:grabbing; }
  .sort-handle svg { width:17px; height:17px; stroke:currentColor; fill:none; }
  .sortable-item { background:var(--surface); border-radius:var(--radius-sm); }
  .sortable-item.dragging { opacity:.95; box-shadow:var(--shadow-lg); background:var(--blue-light); position:relative; z-index:20; }
  body.dragging-active { user-select:none; -webkit-user-select:none; }
  .route-stops { touch-action:pan-y; }

  /* Modal */
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(10,18,32,.5); z-index:600; align-items:center; justify-content:center; padding:18px; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-lg); width:100%; max-width:440px; padding:20px; }
  .modal-title { font-size:16px; font-weight:800; color:var(--ink); }
  .modal-hint { font-size:12.5px; color:var(--text-muted); margin:4px 0 12px; }
  .modal textarea { width:100%; font-family:inherit; font-size:14px; padding:11px 13px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); resize:vertical; outline:none; color:var(--text); background:var(--surface); }
  .modal textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(31,111,178,.15); }
  .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }
  .set-row { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 0; border-top:1px solid var(--line); }
  .set-row:first-of-type { border-top:none; padding-top:6px; }
  .set-label { font-size:14px; font-weight:700; color:var(--ink); }
  #settings-modal .lang-wrap { margin-left:0; }
  .install-btn { display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border:1.5px solid var(--blue); border-radius:11px; background:var(--surface); color:var(--blue); font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:.12s; }
  .install-btn:hover { background:var(--blue-light); }
  .install-btn svg { width:16px; height:16px; }
  .install-btn:disabled { border-color:var(--line-strong); color:var(--text-muted); background:var(--bg-2); cursor:default; }
  .btn-mini.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
  .btn-mini.primary:hover { background:var(--blue-dark); color:#fff; }
  .mk { width:24px; height:24px; border-radius:50%; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.45); box-sizing:border-box; }
  .rt-arrow { width:16px; height:16px; display:flex; align-items:center; justify-content:center; }
  .rt-arrow svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 0 1px rgba(0,0,0,.45)); }
  .mk-home { width:26px; height:26px; background:var(--green-deep); font-size:14px; }
  .leaflet-container { font-family:inherit; }
  /* Crédito del mapa: pequeño, gris y discreto (cabe en una línea) */
  .leaflet-control-attribution { font-size:9.5px !important; line-height:1.3; background:rgba(255,255,255,.72) !important; padding:0 6px; }
  .leaflet-control-attribution, .leaflet-control-attribution a { color:#6b7280 !important; font-weight:400; text-decoration:none; }

  /* Couriers stepper */
  .couriers-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:12px; padding:8px 2px 0; }
  .opt-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 2px; cursor:pointer; }
  .opt-row[hidden] { display:none; }
  .opt-label { font-size:13px; font-weight:600; color:var(--text); }
  .switch { position:relative; width:42px; height:24px; flex-shrink:0; }

  let str = (I18N[lang] && I18N[lang][key]) || I18N.es[key] || key;
  if (vars) for (const k in vars) str = str.replace('{' + k + '}', vars[k]);
  return str;
}
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.querySelectorAll('[data-i18n-title]').forEach(el => el.title = t(el.dataset.i18nTitle));
  const mt = document.getElementById('map-toggle'); if (mt) mt.title = mapMin ? t('expandMap') : t('minimizeMap');
  if (!optBusy) renderOptBtn();

}
function setLang(l){
  if (!I18N[l]) return;
  lang = l;
  lsSet(LS_LANG, l);
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = l;
  applyLang();
}

let saveTimer = null;
let currentRecentId = null;   // recent que estamos editando, para guardar cambios

// Resultado en formato simple para localStorage (sin geometría, que ocupa mucho).
function serializeResult(lr){
  if (!lr || !lr.routes) return null;
  return {
    originCoord: { lat: lr.originCoord.lat, lng: lr.originCoord.lng, address: lr.originCoord.address, approx: !!lr.originCoord.approx },
    routes: lr.routes.map(r => ({
      total: r.total, roadKm: r.roadKm, roadMin: r.roadMin,
      stops: r.stops.map(s => ({ lat: s.lat, lng: s.lng, address: s.address, fromPrev: s.fromPrev, approx: !!s.approx }))
    }))
  };
}

function snapshot(){
  const o = document.getElementById('origin');
  const stops = Array.from(document.querySelectorAll('#stops-container .stop-row')).map(row => {
    const i = row.querySelector('.stop-input');
    const nEl = row.querySelector('.stop-num');
    return { v: i.value, c: i._coord || null, num: nEl ? nEl.value.trim() : '' };
  });
  const onum = document.getElementById('origin-num');
  return { origin: { v: o.value, c: o._coord || null, num: onum ? onum.value.trim() : '' }, stops, couriers, balanceStops, result: serializeResult(lastResult) };
}

function setCouriers(delta){
  couriers = Math.max(1, Math.min(MAX_COURIERS, couriers + delta));
  updateCourierUI();
  saveState();
}
function setBalance(on){ balanceStops = !!on; saveState(); }
function syncOptToggles(){
  const b = document.getElementById('opt-balance'); if (b) b.checked = balanceStops;
}
function updateCourierUI(){
  const el = document.getElementById('courier-count');
  if (el) el.textContent = couriers;
  const dec = document.querySelector('.step-btn'); // first = minus
  const btns = document.querySelectorAll('.step-btn');
  if (btns[0]) btns[0].disabled = couriers <= 1;
  if (btns[1]) btns[1].disabled = couriers >= MAX_COURIERS;
  const br = document.getElementById('balance-row');
  if (br) br.hidden = couriers <= 1;
}
function saveState(){ if (booting) return; clearTimeout(saveTimer); saveTimer = setTimeout(() => lsSet(LS_LAST, snapshot()), 500); }

async function saveDepot(){
  const o = document.getElementById('origin');
  const v = o.value.trim();
  if (!v){ toast(t('writeOriginFirst')); return; }
  let c = o._coord;
  if (!c){ const g = await geocode(v); if (g) c = g; }
  const num = (document.getElementById('origin-num') || {}).value || '';
  lsSet(LS_DEPOT, { v, c: c || null, num: num.trim() });
  if (c) searchBias = { lat: c.lat, lon: c.lng };
  updateDepotIcon();
  toast(t('depotSaved'));
}

  if (btn) btn.hidden = !lsGet(LS_DEPOT);
}
function useSavedDepot(){
  const depot = lsGet(LS_DEPOT);

// ── Punto de salida desde el GPS ────────────────────────────────────────────
async function reverseGeocode(lat, lng){
  if (photonAvailable()){
    try {
      const r = await fetchT(`${PHOTON_BASE}/reverse??lat=${lat}&lon=${lng}&lang=${lang}`, 3500);
      const d = await r.json();
      const p = d.features && d.features[0] && d.features[0].properties;
      if (p){
        const line = [p.name || p.street, p.housenumber].filter(Boolean).join(' ');
        const city = p.city || p.town || p.village || p.county || '';
        const label = [line || p.name, city].filter(Boolean).join(', ');
        if (label) return label;
      }
    } catch { markPhotonDown(); }
  }
  try {
    const d = await liqGet('/reverse', { lat, lon: lng, format: 'json', 'accept-language': lang, normalizeaddress: 1 });
    if (d && d.display_name) return d.display_name.split(',').slice(0, 3).join(',').trim();
  } catch {}
  return null;
}
function useGps(){
  const o = document.getElementById('origin');
  const btn = document.getElementById('btn-gps');
  if (!navigator.geolocation){ toast(t('gpsUnavailable')); return; }
  if (btn) btn.classList.add('locating');
  toast(t('gpsLocating'));
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    o._coord = { lat, lng };
    searchBias = { lat, lon: lng };
    const addr = await reverseGeocode(lat, lng);
    // Si no hay dirección, usamos "lat,lng" (Google Maps lo acepta como origen).
    o.value = addr || `${lat.toFixed(6)},${lng.toFixed(6)}`;
    if (btn) btn.classList.remove('locating');
    syncOrigin();
    saveState();
    toast(t('gpsDone'));
  }, err => {
    if (btn) btn.classList.remove('locating');
    toast(err && err.code === 1 ? t('gpsDenied') : t('gpsUnavailable'));
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
}

// ── Enlaces de Google Maps por repartidor, troceados en tramos ──────────────
// Navegación parada por parada: cada parada se abre como destino en la app
// elegida (Google Maps o Waze), usando la ubicación actual como origen. Así no
// dependemos de que Google reordene/redibuje la ruta y se mantiene el orden óptimo.
const LS_NAVAPP = 'rutarapida:navapp';
let navApp = 'gmaps';
try { const _v = localStorage.getItem(LS_NAVAPP); if (_v === 'waze' || _v === 'gmaps') navApp = _v; } catch {}
const encA = a => encodeURIComponent(a)
  .replace(/'/g, '%27').replace(/!/g, '%21')
  .replace(/\(/g, '%28').replace(/\)/g, '%29').replace(/\*/g, '%2A');
function destQuery(s){
  // Si tenemos el punto exacto resuelto (no aproximado), navegamos a esas coordenadas:
  // así el destino coincide EXACTAMENTE con lo que muestra el preview (sin que Google
  // reinterprete el texto y se vaya a otra población con calle de igual nombre).
  if (s && isFinite(s.lat) && isFinite(s.lng) && !s.approx) return `${s.lat},${s.lng}`;
  if (s && s.address) return s.address;
  if (s && isFinite(s.lat) && isFinite(s.lng)) return `${s.lat},${s.lng}`;
  return '';
}
function isCoordQuery(q){ return /^-?\d+(\.\d+)?,-?\d+(\.\d+)?$/.test(q); }
function navUrl(s, app){
  const q = destQuery(s);
  if (!q) return '';
  if (app === 'waze'){
    // Waze: coordenadas exactas con ll=, o búsqueda por texto con q=
    if (isCoordQuery(q)) return 'https://waze.com/ul?ll=' + encA(q) + '&navigate=yes';
    return 'https://waze.com/ul?q=' + encA(q) + '&navigate=yes';
  }
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encA(q) + '&travelmode=driving';
}
function openStopNav(ci, i){
  const r = lastResult && lastResult.routes && lastResult.routes[ci];
  const s = r && r.stops && r.stops[i];
  const url = s && navUrl(s, navApp);
  if (url) window.open(url, '_blank'); else toast(t('optimizeFirst'));
}
function setNavApp(app){
  navApp = (app === 'waze') ? 'waze' : 'gmaps';
  try { localStorage.setItem(LS_NAVAPP, navApp); } catch {}
  syncNavSeg();
  if (lastResult) renderResult(false);
}
function syncNavSeg(){

  const w = document.getElementById('set-nav-waze');
  if (g) g.classList.toggle('on', navApp !== 'waze');
  if (w) w.classList.toggle('on', navApp === 'waze');
}

let deferredInstall = null;
(function setupInstall(){
  // Manifiesto en runtime (sirve cuando la app se aloja en un dominio).
  try {
    const icon = 'data:image/svg+xml,' + encodeURIComponent(
      "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='#1f6fb2' d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z'/><path fill='#fff' d='M11 13.5v-3H9l4-6.5v4.5h2l-4 5z'/></svg>");
    const manifest = { name: 'RutaRapida', short_name: 'RutaRapida', start_url: '.', scope: '.', display: 'standalone', background_color: '#f4f8fc', theme_color: '#1f6fb2', icons: [{ src: icon, sizes: 'any', type: 'image/svg+xml', purpose: 'any' }] };
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(link);
  } catch {}
})();
function isStandalone(){
  return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function refreshInstallBtn(){
  const btn = document.getElementById('install-btn');
  if (!btn) return;
  if (isStandalone()){
    btn.disabled = true;
    btn.querySelector('span').textContent = t('installed');

    btn.querySelector('span').textContent = t('install');
  }

window.addEventListener('beforeinstallprompt', e => {

});
window.addEventListener('appinstalled', () => { deferredInstall = null; refreshInstallBtn(); toast(t('installed')); });
async function installApp(){
  if (isStandalone()){ toast(t('installed')); return; }
  if (deferredInstall){
    deferredInstall.prompt();
    try { await deferredInstall.userChoice; } catch {}
    deferredInstall = null;

  }

// Texto para compartir: lista de paradas EN ORDEN, cada una con su enlace.
function shareTextFor(i){
  const r = lastResult && lastResult.routes && lastResult.routes[i];
  if (!r || !Array.isArray(r.stops) || !r.stops.length) return '';
  const multi = lastResult.routes.length > 1;
  const lines = [t('optimizedRoute') + (multi ? ' \u00b7 ' + t('courier') + ' ' + (i + 1) : '')];
  const oc = lastResult.originCoord;
  if (oc && oc.address) lines.push(t('startPoint') + ': ' + oc.address);
  lines.push('');
  r.stops.forEach((s, idx) => {
    lines.push(`${idx + 1}. ${s.address}`);
    const u = navUrl(s, navApp);
    if (u) lines.push(u);
  });
  return lines.join('\n');
}

async function copyText(text){
  try { if (navigator.clipboard){ await navigator.clipboard.writeText(text); return true; } } catch {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy'); document.body.removeChild(ta); return ok;
  } catch { return false; }
}

// ── Compartir por QR / enlace (sin backend) ─────────────────────────────────
// La ruta del repartidor va COMPRIMIDA dentro del fragmento '#r=' del enlace.
// El enlace usa la URL ACTUAL de la página, así que si mañana mueves la app a
// otro dominio/backend, los QR apuntarán solos a la nueva URL (nada que tocar).
function b64urlFromBytes(bytes){
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function bytesFromB64url(b64){
  b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const s = atob(b64), out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out;
}
async function packStr(str){
  // Comprime con gzip si el navegador lo soporta; si no, base64 directo.
  if (typeof CompressionStream === 'function'){
    const cs = new CompressionStream('gzip');
    const w = cs.writable.getWriter();
    w.write(new TextEncoder().encode(str)); w.close();
    const buf = await new Response(cs.readable).arrayBuffer();
    return 'z' + b64urlFromBytes(new Uint8Array(buf));
  }
  return 'p' + b64urlFromBytes(new TextEncoder().encode(str));
}
async function unpackStr(packed){
  const tag = packed[0], body = packed.slice(1);
  const bytes = bytesFromB64url(body);
  if (tag === 'z' && typeof DecompressionStream === 'function'){
    const ds = new DecompressionStream('gzip');
    const w = ds.writable.getWriter(); w.write(bytes); w.close();
    const buf = await new Response(ds.readable).arrayBuffer();
    return new TextDecoder().decode(buf);
  }
  return new TextDecoder().decode(bytes);
}
function packRoute(ci){
  const r = lastResult && lastResult.routes && lastResult.routes[ci];
  if (!r) return null;
  const oc = lastResult.originCoord || {};
  const rnd = n => Math.round(n * 1e6) / 1e6;
  return {
    v: 1,
    o: { a: oc.address || '', c: [rnd(oc.lat), rnd(oc.lng)], x: oc.approx ? 1 : 0 },
    s: (r.stops || []).map(s => ({ a: s.address || '', c: [rnd(s.lat), rnd(s.lng)], d: s.done ? 1 : 0, p: s.approx ? 1 : 0 }))
  };
}
async function buildShareUrl(ci){
  const data = packRoute(ci);
  if (!data || !data.s.length) return null;
  const packed = await packStr(JSON.stringify(data));
  return location.origin + location.pathname + '#r=' + packed;
}
async function shareQR(ci){
  const url = await buildShareUrl(ci);
  if (!url){ toast(t('optimizeFirst')); return; }
  openQRModal(url);
}

// Reconstruye lastResult a partir del payload del enlace.
function routeFromPayload(d){
  const mk = c => ({ lat: c[0], lng: c[1] });
  const originCoord = { ...mk(d.o.c), address: d.o.a, approx: !!d.o.x };
  const stops = (d.s || []).map(s => ({ ...mk(s.c), address: s.a, done: !!s.d, approx: !!s.p }));
  let prev = originCoord, total = 0;
  stops.forEach(s => { const dd = dist(prev, s); s.fromPrev = dd; prev = s; total += dd; });
  return { originCoord, routes: [{ stops, total }] };
}
async function loadSharedRoute(){
  const m = (location.hash || '').match(/[#&]r=([^&]+)/);
  if (!m) return false;
  try {
    const json = await unpackStr(decodeURIComponent(m[1]));
    const d = JSON.parse(json);
    if (!d || !Array.isArray(d.s) || !d.s.length) return false;
    lastResult = routeFromPayload(d);
    activeCourier = 0; mapShowAll = true;
    // Refleja la dirección de salida en el editor (por si quiere recalcular).
    const o = document.getElementById('origin');
    if (o){ o.value = d.o.a || ''; o._coord = { lat: d.o.c[0], lng: d.o.c[1], address: d.o.a, approx: !!d.o.x }; syncOrigin(); }
    const panel = document.getElementById('result-panel');
    panel.classList.add('on');
    renderResult(true);
    saveState();
    enterCourierMode(true); // este móvil queda fijo en la ruta compartida
    // Limpia el '#r=' de la URL para que al recargar no se vuelva a forzar.
    try { history.replaceState(null, '', location.origin + location.pathname); } catch {}

function pushRecent(snap){

  const list = recentList();
  const sig = JSON.stringify([snap.origin && snap.origin.v, snap.stops.map(s => s.v)]);
  const filtered = list.filter(r => JSON.stringify([r.origin && r.origin.v, r.stops.map(s => s.v)]) !== sig);

  filtered.unshift({ id, origin: snap.origin, stops: snap.stops, couriers: snap.couriers, balanceStops: snap.balanceStops, result: snap.result, ts: Date.now() });

  if (i < 0) return;

  try {

// ── Photon (OSM) autocomplete helpers ───────────────────────────────────────
// Photon is built for type-ahead: it does prefix matching and tolerates typos,
// so you get results WITHOUT having to type the full city name.
//
// searchBias gently pulls suggestions toward an area so local streets win.
// It is NOT hardcoded: it follows your depot (the origin field). Until the
// origin is known it stays null, and Photon ranks purely by how well the
// text matches — which is what you want when you type the city yourself.
let searchBias = null; // { lat, lon } | null, updated from the origin

// Garantiza que haya un punto de referencia (tu salida) antes de buscar paradas.
// Si la salida se tecleó sin elegir del desplegable, no tiene coordenada y el
// sesgo quedaría nulo → resultados globales. Aquí la geolocalizamos una sola vez.
let biasTriedFor = '';
async function ensureBias(){
  if (searchBias) return;
  const o = document.getElementById('origin');
  if (!o) return;
  if (o._coord){ searchBias = { lat: o._coord.lat, lon: o._coord.lng }; return; }
  const v = (o.value || '').trim();
  if (!v || v === biasTriedFor) return;
  biasTriedFor = v;
  const g = await geocode(v);
  if (g){ o._coord = g; searchBias = { lat: g.lat, lon: g.lng }; }
}

// La ciudad de tu salida (último trozo de la dirección de salida), para acotar
// búsquedas de calles que escribes sin ciudad. Quita el código postal inicial.
function originCity(){
  const o = document.getElementById('origin');
  if (!o) return '';
  const parts = (o.value || '').split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length < 2) return '';
  const last = parts[parts.length - 1].replace(/^\d{4,5}\s*/, '').trim();
  if (last.length < 3 || /^\d+$/.test(last)) return '';
  return last;
}

async function photonQuery(q){
  const p = new URLSearchParams({ q, limit: 15 });
  if (searchBias) {
    p.set('lat', searchBias.lat);
    p.set('lon', searchBias.lon);
    p.set('location_bias_scale', '0.8');
  }
  const r = await fetchT((PHOTON_BASE + '/api/?') + p, 3500);
  const d = await r.json();
  return (d && d.features) || [];
}

// Caché de sugerencias EN MEMORIA (esta sesión): evita repetir llamadas de
// autocompletado para el mismo texto (p. ej. al borrar y reescribir).
const suggCache = new Map();
function suggKey(q){
  const b = searchBias ? (searchBias.lat.toFixed(2) + ',' + searchBias.lon.toFixed(2)) : '';
  return cacheKey(q) + '|' + b;
}
async function fetchSuggestions(query) {
  if (query.length < 3) return [];   // umbral: menos llamadas por dirección (ahorra créditos)
  const sk = suggKey(query);
  if (suggCache.has(sk)) return suggCache.get(sk);
  const remember = (list) => { try { if (list && list.length){ if (suggCache.size > 200) suggCache.clear(); suggCache.set(sk, list); } } catch {} return list; };
  // Búsquedas a lanzar: lo que escribiste y, si no pusiste ciudad pero conozco
  // la de tu salida, también "lo escrito, tu ciudad" — así las calles locales
  // aparecen aunque exista el mismo nombre en otras poblaciones.
  const queries = [query];
  if (!query.includes(',')) {
    const city = originCity();
    if (city && !query.toLowerCase().includes(city.toLowerCase())) queries.push(query + ', ' + city);
  }
  // 1) Photon (TU servidor; por defecto público solo para validar) — PRINCIPAL.
  if (photonAvailable()) {
    try {
      const lists = await Promise.all(queries.map(q => photonQuery(q).catch(() => [])));
      const merged = [], seen = new Set();
      for (const list of lists) for (const f of list) {
        const c = f.geometry && f.geometry.coordinates;
        const k = c ? c[0].toFixed(5) + ',' + c[1].toFixed(5) : Math.random();
        if (seen.has(k)) continue;
        seen.add(k); merged.push(f);
      }
      if (merged.length){ srvState.search = 'ok'; return remember(merged); }
    } catch { markPhotonDown(); }
  }
  // 2) LocationIQ — RESPALDO si tu Photon no responde.
  const la = await liqAutocomplete(query);
  if (la){ srvState.search = 'fallback'; return remember(la); }
  return [];
}

// Pull the house number out of whatever the user typed (e.g. "Serrano 45" -> "45")
function numberFromQuery(q) {
  const m = (q || '').match(/(\d{1,4}\s?[a-zA-Z]?)(?!\d)/); // first short number, not a postcode run
  return m ? m[1].trim() : '';
}

function buildLabel(feature, userQuery) {
  const a = feature.properties || {};
  const streetName = a.street || a.name || '';
  // El número va en su propia casilla, así que la etiqueta usa solo el número
  // de portal REAL del resultado (si lo trae). No pegamos el número escrito,
  // para no confundir "Carrer 9" (nombre de calle) con un portal nº 9.
  const num = a.housenumber || '';
  const street = streetName ? (num ? streetName + ' ' + num : streetName) : (a.name || '');
  const city = a.city || a.town || a.village || a.municipality || a.county || a.state || '';
  return { street, city, label: city ? street + ', ' + city : street };
}

// Turn raw Photon features into a clean, de-duplicated, well-ranked list.
// The key idea: the city you type is authoritative. If your query ends in
// ", <city>", results in that city are pushed to the top even when a street
// name matches better somewhere else.
function refineResults(features, query) {
  const norm = s => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const parts = query.split(',');
  const cityHint = parts.length > 1 ? norm(parts[parts.length - 1]) : '';
  const qTokens = norm(query.replace(/,/g, ' ')).split(/\s+/).filter(t => t && (t.length >= 2 || /^\d+$/.test(t)));

  // Distancia (km) a tu punto de salida, para que la dirección más cercana
  // gane cuando varias coinciden igual de bien con el texto (p. ej. "Garbí").
  const bias = searchBias ? { lat: searchBias.lat, lng: searchBias.lon } : null;
  const kmFromBias = (la, lo) => {
    if (!bias) return 0;
    const R = 6371, toR = x => x * Math.PI / 180;
    const dLa = toR(la - bias.lat), dLo = toR(lo - bias.lng);
    const h = Math.sin(dLa / 2) ** 2 + Math.cos(toR(bias.lat)) * Math.cos(toR(la)) * Math.sin(dLo / 2) ** 2;
    return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
  };

  const out = [], seen = new Set();
  const coarse = new Set(['country', 'state', 'county']);
  for (const f of features) {
    const p = f.properties || {};
    if (coarse.has(p.type)) continue;                 // skip whole provinces/countries
    const [lng, lat] = (f.geometry && f.geometry.coordinates) || [];
    if (!isFinite(lat) || !isFinite(lng)) continue;
    const { street, city, label } = buildLabel(f, query);
    if (!label) continue;
    const key = norm(label);
    if (seen.has(key)) continue;                      // collapse duplicate street segments
    seen.add(key);

    // Relevancia: cuántas palabras escritas aparecen en el NOMBRE de la calle
    // (sin el número de portal). Un número que forma parte del nombre de la
    // calle (p. ej. "Carrer 9") puntúa fuerte y sube por encima de los portales.
    const nameRaw = norm((p.street || p.name || '') + ' ' + city + ' ' + (p.postcode || ''));
    let score = 0;
    for (const t of qTokens){
      if (nameRaw.includes(t)) score += (/^\d+$/.test(t) ? 2 : (t.length >= 4 ? 2 : 1));
    }
    if (cityHint && norm(city).includes(cityHint)) score += 6;  // typed city dominates

    out.push({
      street: street || label, city, label, lat, lng, postcode: p.postcode || '',
      score,
      dist: kmFromBias(lat, lng),
      hasNumber: p.housenumber ? 1 : 0,
      typeRank: p.type === 'house' ? 0 : (p.type === 'street' ? 1 : 2),
    });
  }
  // Best textual match first; then exact addresses; then streets; then the rest.
  // Mejor coincidencia de texto primero; a igualdad, la MÁS CERCANA a tu salida;
  // luego direcciones con número, luego calles, luego el resto.
  // Quitamos el ruido: resultados que no coinciden en nada con lo que escribiste.
  let ranked = out.filter(r => r.score > 0);
  if (!ranked.length) ranked = out;
  ranked.sort((a, b) => b.score - a.score || a.dist - b.dist || b.hasNumber - a.hasNumber || a.typeRank - b.typeRank);
  return ranked.slice(0, 7);
}

// Bold the parts of a suggestion that match what the user typed.
function highlight(text, query) {
  const esc = s => s.replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const toks = [...new Set(query.toLowerCase().split(/\s+/).filter(t => t.length >= 2))]
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const safe = esc(text);
  if (!toks.length) return safe;
  return safe.replace(new RegExp('(' + toks.join('|') + ')', 'ig'), '<b class="ac-hl">$1</b>');
}

// ── Autocomplete widget ────────────────────────────────────────────────────
function attachAutocomplete(input, drop, isOrigin) {
  const uid = 'ac_' + (++stopIdCounter);
  let locked = false;     // true while we're programmatically setting input.value
  let current = [];       // refined results currently shown
  let active = -1;        // index highlighted via keyboard

  function close() { drop.classList.remove('open'); active = -1; }

  // Coloca el desplegable como 'fixed' calculado desde el campo, para que no
  // lo recorte el contenedor con scroll (la lista de paradas en escritorio).
  function place() {
    const r = input.getBoundingClientRect();
    drop.style.position = 'fixed';
    drop.style.left = r.left + 'px';
    drop.style.width = r.width + 'px';
    drop.style.right = 'auto';
    const h = drop.offsetHeight || 0;
    const below = window.innerHeight - r.bottom;
    if (h && h + 12 > below && r.top > below) {
      drop.style.top = Math.max(6, r.top - h - 6) + 'px';   // abre hacia arriba
    } else {
      drop.style.top = (r.bottom + 6) + 'px';
    }
  }
  window.addEventListener('scroll', () => { if (drop.classList.contains('open')) place(); }, true);
  window.addEventListener('resize', () => { if (drop.classList.contains('open')) place(); });

  function select(label, lat, lng) {
    locked = true;
    clearTimeout(debounceTimers[uid]);
    input.value = label;
    input._coord = { lat, lng };
    if (isOrigin && isFinite(lat) && isFinite(lng)) searchBias = { lat, lon: lng };
    close();
    saveState();
    // unlock after browser has flushed any synthetic input events
    requestAnimationFrame(() => requestAnimationFrame(() => { locked = false; }));
  }

  function previewSrc(lat, lng) {
    const d = 0.004;
    const bbox = [lng - d, lat - d, lng + d, lat + d].join(',');
    return 'https://www.openstreetmap.org/export/embed.html?layer=mapnik'
         + '&bbox=' + encodeURIComponent(bbox)
         + '&marker=' + encodeURIComponent(lat + ',' + lng);
  }

  function setActive(i) {
    const els = drop.querySelectorAll('.ac-item');
    els.forEach(e => e.classList.remove('active'));
    if (i >= 0 && i < els.length) {
      els[i].classList.add('active');
      els[i].scrollIntoView({ block: 'nearest' });
      const r = current[i];
      const prev = drop.querySelector('.ac-preview');
      if (r && prev) {
        prev.querySelector('.ac-preview-label').textContent = r.label;
        prev.querySelector('iframe').src = previewSrc(r.lat, r.lng);
        prev.style.display = 'block';
      }
    }
    active = i;
  }

  function render(q) {
    if (!current.length) {
      drop.innerHTML = '<div class="ac-none">' + t('noResults') + '</div>';
      return;
    }
    const items = current.map((r, i) => {
      const sub = r.postcode ? `${r.postcode} · ${r.city}` : r.city;
      return `<div class="ac-item" data-idx="${i}">
        <div class="ac-main">${highlight(r.street, q)}</div>
        <div class="ac-sub">${highlight(sub, q)}</div>
      </div>`;
    }).join('');
    drop.innerHTML = `<div class="ac-list">${items}</div>
      <div class="ac-preview" style="display:none">
        <div class="ac-preview-label"></div>
        <iframe loading="lazy" referrerpolicy="no-referrer" title="${t('mapPreview')}"></iframe>
      </div>`;
    drop.querySelectorAll('.ac-item').forEach(item => {
      const i = +item.dataset.idx;
      item.addEventListener('mouseenter', () => setActive(i));
      // mousedown fires before blur, so we can safely call select()
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const r = current[i];
        if (r) select(r.label, r.lat, r.lng);
      });
    });
    // Show a preview of the top hit straight away.
    setActive(0);
  }

  async function search() {
    if (locked) return;
    const q = input.value.trim();
    input._coord = null;
    if (q.length < 3) { close(); return; }
    drop.innerHTML = '<div class="ac-loading">' + t('searching') + '</div>';
    drop.classList.add('open');
    place();
    if (!isOrigin) await ensureBias();   // fija el punto de referencia (tu salida)
    const features = await fetchSuggestions(q);
    if (locked) return;  // user already selected something while we were fetching
    current = refineResults(features, q);
    active = -1;
    render(q);
    place();
  }

  input.addEventListener('input', () => {
    if (locked) return;
    clearTimeout(debounceTimers[uid]);
    debounceTimers[uid] = setTimeout(search, 400);
  });
  input.addEventListener('blur', () => setTimeout(close, 180));
  input.addEventListener('keydown', e => {
    const open = drop.classList.contains('open');
    if (e.key === 'Escape') { close(); return; }
    if (!open || !current.length) return;
    if (e.key === 'ArrowDown')      { e.preventDefault(); setActive((active + 1) % current.length); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); setActive((active - 1 + current.length) % current.length); }
    else if (e.key === 'Enter' && active >= 0) {
      e.preventDefault();
      const r = current[active];
      if (r) select(r.label, r.lat, r.lng);
    }
  });
}

    <div class="stop-display" title="Editar"></div>
    <button class="btn-remove" onclick="removeStop(this)" aria-label="Eliminar">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

function renumber() {
  document.querySelectorAll('#stops-container .stop-row').forEach((r, i) => {
    const b = r.querySelector('.badge-num');
    if (b) b.textContent = i + 1;
  });
}

function escHtml(s){ return (s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
// Pinta una fila (parada u origen) en modo compacto: dirección completa, con el
// número resaltado. Sirve tanto para .stop-row como para .origin-row.
function fillRow(row){
  if (!row) return;
  const inp = row.querySelector('.stop-input, #origin');
  if (!inp) return;
  const v = (inp.value || '').trim();
  if (!v){ row.classList.remove('filled'); return; }
  const numEl = row.querySelector('.stop-num');
  const num = numEl ? numEl.value.trim() : '';
  const numHtml = num ? ' <span class="sd-num">' + escHtml(num) + '</span>' : '';
  const ci = v.indexOf(',');
  const html = ci === -1
    ? escHtml(v) + numHtml
    : escHtml(v.slice(0, ci).trim()) + numHtml + escHtml(v.slice(ci));
  const disp = row.querySelector('.stop-display');
  if (disp) disp.innerHTML = html;
  row.classList.add('filled');
}
function editRow(row){
  if (!row) return;

const LIQ_KEY = 'pk.b9eb8571a5c5ae434e7d06f86a867c65';

const LS_LIQ_OUT = 'rutarapida:liqout';
let liqNetFails = 0, liqSkipUntil = 0;
// Diagnóstico (en memoria, esta sesión): cuántas llamadas a LocationIQ van bien/mal.
let provHits = { liqOk: 0, liqFail: 0, fb: 0, lastErr: '' };
let liqBal = null;   // último saldo consultado de LocationIQ: { day, bonus } | 'err' | null
// Último resultado de cada motor propio: 'ok' = lo resolvió tu servidor; 'fallback' =
// hubo que usar LocationIQ (servidor caído O un fallo en el código que lo impide).
// Se autocorrige con el uso: la próxima operación que vaya por tu servidor lo pone en verde.
let srvState = { search: 'unknown', route: 'unknown' };
function liqUsable(){
  if (Date.now() < liqSkipUntil) return false;
  try { return (Date.now() - (+lsGet(LS_LIQ_OUT) || 0)) > 12*3600*1000; } catch { return true; }
}
function markLiqOut(){ try { lsSet(LS_LIQ_OUT, String(Date.now())); } catch {} }
function clearLiqOut(){ try { lsDel(LS_LIQ_OUT); } catch {} }
function liqBad(status){
  if (status === 401 || status === 403){ markLiqOut(); return true; }   // clave/permiso → pausa larga (12 h)
  if (status === 429){ liqSkipUntil = Date.now() + 2500; return true; }  // demasiado rápido → pausa CORTA (2,5 s)
  return false;
}
function liqNetTrip(){ if (++liqNetFails >= 2) liqSkipUntil = Date.now() + 90000; }
// Limitador de velocidad: separa las llamadas a LocationIQ ~550 ms (≈ <2/seg)
// para no provocar el 429 en primer lugar (su plan gratis va a 2 peticiones/segundo).
let liqNextSlot = 0;
async function liqThrottle(){
  const MIN_GAP = 550;
  const now = Date.now();
  const slot = Math.max(now, liqNextSlot);
  liqNextSlot = slot + MIN_GAP;
  const wait = slot - now;
  if (wait > 0) await new Promise(r => setTimeout(r, wait));
}
async function liqGet(path, params, ms = 4000){
  await liqThrottle();
  const p = new URLSearchParams(params); p.set('key', LIQ_KEY);
  let r;
  try { r = await fetchT(LIQ_BASE + path + '?' + p.toString(), ms); }
  catch (e) { provHits.liqFail++; provHits.lastErr = 'red/timeout'; liqNetTrip(); throw e; }
  if (r.status === 404){ liqNetFails = 0; clearLiqOut(); return null; }   // "sin resultados": NO es fallo, NO pausa
  if (liqBad(r.status)) { provHits.liqFail++; provHits.lastErr = 'HTTP ' + r.status; throw new Error('liq ' + r.status); }
  if (!r.ok) { provHits.liqFail++; provHits.lastErr = 'HTTP ' + r.status; if (r.status >= 500) liqNetTrip(); throw new Error('liq http ' + r.status); }
  const d = await r.json(); provHits.liqOk++; liqNetFails = 0; clearLiqOut(); return d;
}

function liqViewbox(){
  if (!searchBias) return null;
  const dLat = SEARCH_KM / 111;
  const dLon = SEARCH_KM / (111 * Math.max(0.2, Math.cos(searchBias.lat * Math.PI / 180)));
  return [searchBias.lon - dLon, searchBias.lat + dLat, searchBias.lon + dLon, searchBias.lat - dLat].join(',');

function liqToApp(o){

async function liqAutocomplete(query){

    return { dur: d.durations, dist: Array.isArray(d.distances) ? d.distances : null };  // null si no hay distancias reales (no falsear con tiempos)

// Trazado LocationIQ (Directions, máx 25 puntos/llamada → se parte en tramos solapados).
async function liqRoad(coords){
  if (!liqUsable() || coords.length < 2) return null;
  try {
    const CH = 25, geometry = []; let km = 0, sec = 0;
    for (let i = 0; i < coords.length - 1; i += (CH - 1)){
      const seg = coords.slice(i, i + CH);
      if (seg.length < 2) break;
      const path = seg.map(c => `${c.lng},${c.lat}`).join(';');
      const d = await liqGet('/directions/driving/' + path, { overview: 'full', geometries: 'geojson' }, 9000);
      const r = d && d.code === 'Ok' && d.routes && d.routes[0];
      if (!r || !r.geometry || !Array.isArray(r.geometry.coordinates)) return null;
      r.geometry.coordinates.forEach(([lng, lat]) => geometry.push([lat, lng]));
      km += (r.distance || 0) / 1000; sec += (r.duration || 0);
    }
    if (!geometry.length) return null;
    return { km, min: Math.round(sec / 60), geometry };
  } catch { return null; }
}

  if (c) cachePut(k, c);

// Quita el tipo de vía del principio ("Carrer de", "Avinguda", "Av.", "Calle"...)
// para quedarnos con el nombre, que es lo que mejor casa en la búsqueda estructurada
// (así "Carrer de Josep Tarradellas" encuentra la "Avinguda de Josep Tarradellas").
function streetCore(streetRaw){
  let s = (streetRaw || '').trim();
  s = s.replace(/^c\/\s*/i, '');
  s = s.replace(/^(ctra|crta|avda|avgda|av|pg|ps|pl)\.?\s+/i, '');   // abreviatura + espacio (no parte de palabra)
  s = s.replace(/^(carrer|calle|avinguda|avenida|passeig|paseo|pla[\u00e7c]a|plaza|ronda|rambla|travessera|cam[\u00edi]|camino|carretera|gran via|via|baixada|pujada|riera|carrero)\s+/i, '');
  s = s.replace(/^(de l'|de la |de las |de los |dels |del |de |d')/i, '');
  return s.trim();
}
// Separa "Calle X 12, Ciudad" -> { streetRaw:"Calle X 12", city:"Ciudad" } (quita CP).
function splitCityStreet(base){
  const parts = (base || '').split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length <= 1) return { streetRaw: (base || '').trim(), city: '' };
  const city = parts[parts.length - 1].replace(/\b\d{4,5}\b/g, '').trim();
  const streetRaw = parts.slice(0, -1).join(', ').trim();
  return { streetRaw, city };
}
// Descompone una dirección en { street, hn, city } para búsqueda estructurada.
function addrParts(base, num){
  const { streetRaw, city } = splitCityStreet(base);
  let street = streetRaw, hn = (num || '').trim();
  const m = streetRaw.match(/^(.*?)[\s,]+(\d+[a-zA-Z]?)$/);   // número pegado al final del nombre
  if (m){ street = m[1].trim(); if (!hn) hn = m[2]; }
  street = streetCore(street) || street;
  return { street, hn, city };
}
// Búsqueda ESTRUCTURADA de Photon: mucho más precisa que el texto libre porque
// fija ciudad y separa nombre de calle + número (no confunde de municipio).
async function geocodeStructured(base, num){

async function cityCenter(city){

// geocodificada (calle homónima en otro municipio). Pedimos una segunda opinión a
// LocationIQ y, si la sitúa claramente más cerca de la ciudad, la usamos.
const SUSPECT_KM = 8;
async function sanityCheckCity(geo, base, num){
  const { street, hn, city } = addrParts(base, num);
  if (!city) return geo;
  const center = await cityCenter(city);
  if (!center) return geo;
  const dGeo = dist(geo, center);
  if (dGeo <= SUSPECT_KM) return geo;            // está donde debería: ok
  const alt = await liqGeocodeStructured(base, num);
  if (alt && dist(alt, center) < dGeo - 1) return alt;   // claramente más cerca de la ciudad
  return geo;
}

// Combina dirección + número de casa: "Calle X, Ciudad" + "32" -> "Calle X 32, Ciudad"
function withNumber(addr, num){
  addr = (addr || '').trim(); num = (num || '').trim();
  if (!num) return addr;
  const ci = addr.indexOf(',');
  if (ci === -1) return addr + ' ' + num;
  return addr.slice(0, ci).trim() + ' ' + num + addr.slice(ci);
}
// Separa el número de casa de un texto pegado: "Calle X 32, Ciudad" -> {address:"Calle X, Ciudad", num:"32"}
function splitNumber(text){
  text = (text || '').trim();
  const num = numberFromQuery(text);
  if (!num) return { address: text, num: '' };
  const address = text.replace(new RegExp('\\s*\\b' + num.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b'), '')
                      .replace(/\s{2,}/g, ' ').replace(/\s+,/g, ',').trim();
