async function resolveCoord(input) {
  const base = input.value.trim();
  if (!base) return null;
  const num = rowNumber(input);
  const val = withNumber(base, num);   // dirección completa, con el número de la casilla
  const ck = cacheKey(val);
  // 0) Coordenada ya guardada en este dispositivo (instantánea, sin proveedor).
  // 1) Coordenada del autocompletado (si la eligió del desplegable).
  // 2) Búsqueda estructurada (calle + número + ciudad).
  // 3) Texto libre.  4) Solo la calle.
  let geo = null;
  if (input._coord && isFinite(input._coord.lat)) geo = { lat: input._coord.lat, lng: input._coord.lng };
  if (!geo){ const hit = cacheGet(ck); if (hit) return { lat: hit.lat, lng: hit.lng, address: val, approx: false }; }
  if (!geo) geo = await geocodeStructured(base, num);
  if (!geo) geo = await geocode(val);
  if (!geo && num) geo = await geocode(base);
  if (geo){
    geo = await sanityCheckCity(geo, base, num);   // corrige homónimos en otro municipio
    cachePut(ck, geo);                             // guarda el resultado exacto en el dispositivo
    return { lat: geo.lat, lng: geo.lng, address: val, approx: false };
  }
  // Hueco real de OSM: caemos al centro de la ciudad para poder ordenarla.
  const parts = base.split(',');
  const cityHint = parts.length > 1 ? parts[parts.length - 1].trim() : '';
  if (cityHint) {
    const cc = await geocode(cityHint);
    if (cc) return { ...cc, address: val, approx: true };
  }
  return null; // genuinely couldn't place it at all
}

// ── Route optimizer ────────────────────────────────────────────────────────
function dist(a, b) {
  const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// Split stops into k geographic clusters (one per courier) with k-means.
// Farthest-point seeding keeps the initial centroids well spread.
function kmeans(points, k){
  if (k <= 1 || points.length <= 1) return [points.slice()];
  let centroids = [points[0]];
  while (centroids.length < k){
    let best = points[0], bestD = -1;
    for (const p of points){
      let d = Infinity;
      for (const c of centroids) d = Math.min(d, dist(c, p));
      if (d > bestD){ bestD = d; best = p; }
    }
    centroids.push(best);
  }
  const assign = new Array(points.length).fill(0);
  for (let iter = 0; iter < 15; iter++){
    let changed = false;
    points.forEach((p, idx) => {
      let bi = 0, bd = Infinity;
      centroids.forEach((c, ci) => { const d = dist(c, p); if (d < bd){ bd = d; bi = ci; } });
      if (assign[idx] !== bi){ assign[idx] = bi; changed = true; }
    });
    const sums = centroids.map(() => ({ lat: 0, lng: 0, n: 0 }));
    points.forEach((p, idx) => { const a = assign[idx]; sums[a].lat += p.lat; sums[a].lng += p.lng; sums[a].n++; });
    centroids = sums.map((sm, ci) => sm.n ? { lat: sm.lat / sm.n, lng: sm.lng / sm.n } : centroids[ci]);
    if (!changed && iter > 0) break;
  }
  const clusters = centroids.map(() => []);
  points.forEach((p, idx) => clusters[assign[idx]].push(p));
  return clusters.filter(c => c.length); // descarta clusters vacíos
}

// k-medoids sobre una distancia ARBITRARIA D (aquí, tiempo real por carretera de la
// matriz). A diferencia de k-means (que promedia coordenadas, geométrico), aquí los
// "centros" son paradas reales y la cercanía es por carretera → grupos compactos de
// verdad cuando hay ríos, rondas o sentidos únicos que separan zonas vecinas.
function kmedoids(points, k, D){
  if (k <= 1 || points.length <= 1) return [points.slice()];
  let medoids = [points[0]];                       // siembra: el más lejano cada vez (farthest-first)
  while (medoids.length < k){
    let best = points[0], bestD = -1;
    for (const p of points){
      let d = Infinity;
      for (const m of medoids) d = Math.min(d, D(m, p));
      if (d > bestD){ bestD = d; best = p; }
    }
    medoids.push(best);
  }
  const assign = new Array(points.length).fill(0);
  for (let iter = 0; iter < 12; iter++){
    let changed = false;
    points.forEach((p, idx) => {
      let bi = 0, bd = Infinity;
      medoids.forEach((m, ci) => { const d = D(m, p); if (d < bd){ bd = d; bi = ci; } });
      if (assign[idx] !== bi){ assign[idx] = bi; changed = true; }
    });
    const groups = medoids.map(() => []);
    points.forEach((p, idx) => groups[assign[idx]].push(p));
    let moved = false;
    groups.forEach((g, ci) => {
      if (!g.length) return;
      let bestM = g[0], bestSum = Infinity;        // nuevo medoide = el que minimiza suma de D al resto
      for (const a of g){ let s = 0; for (const b of g) s += D(a, b); if (s < bestSum){ bestSum = s; bestM = a; } }
      if (bestM !== medoids[ci]){ medoids[ci] = bestM; moved = true; }
    });
    if (!changed && !moved && iter > 0) break;
  }
  const clusters = medoids.map(() => []);
  points.forEach((p, idx) => clusters[assign[idx]].push(p));
  return clusters.filter(c => c.length);
}

function nearestNeighbor(origin, stops, cost) {
  const c = cost || dist;
  let cur = origin, rem = [...stops], route = [];
  while (rem.length) {
    let best, bestD = Infinity, bestI = 0;
    rem.forEach((s, i) => { const d = c(cur,s); if (d < bestD) { bestD = d; best = s; bestI = i; } });
    route.push(best);
    cur = best; rem.splice(bestI, 1);
  }
  return route;
}

// 2-opt: repeatedly reverse segments that shorten the path. Fixes the
// self-crossing zig-zags that plain nearest-neighbour leaves behind.
// Origin is fixed at the start; the end is free (open delivery route).
// "Don't-look bits": cada nodo que no encontró mejora se marca y se salta en las
// siguientes pasadas hasta que una inversión cercana lo reactiva. Converge mucho
// antes en rutas grandes sin cambiar el resultado (termina en óptimo local 2-opt).
function twoOpt(origin, stops, cost) {
  const C = cost || dist;
  const route = [origin, ...stops];
  const n = route.length;
  const D = (a, b) => C(route[a], route[b]);
  const dontlook = new Array(n).fill(false);
  let improvedAny = true, passes = 0;
  const MAX_PASSES = 200; // red de seguridad: nunca se cuelga
  while (improvedAny && passes++ < MAX_PASSES) {
    improvedAny = false;
    for (let i = 1; i < n - 1; i++) {
      if (dontlook[i]) continue;
      let foundForI = false;
      for (let k = i + 1; k < n; k++) {
        const tail = k + 1 < n;
        const before = D(i - 1, i) + (tail ? D(k, k + 1) : 0);
        const after  = D(i - 1, k) + (tail ? D(i, k + 1) : 0);
        if (after + 1e-9 < before) {
          let a = i, b = k;
          while (a < b) { const t = route[a]; route[a] = route[b]; route[b] = t; a++; b--; }
          foundForI = true; improvedAny = true;
          // reactivar los extremos afectados por la inversión
          [i - 1, i, k, (k + 1 < n ? k + 1 : 0)].forEach(idx => { if (idx > 0) dontlook[idx] = false; });
        }
      }
      if (!foundForI) dontlook[i] = true;
    }
  }
  return route.slice(1); // drop origin, keep optimised stop order
}

// Coste de una ruta abierta (origen fijo al inicio, sin volver).
function routeCost(origin, order, cost){
  const c = cost || dist;
  let L = 0, cur = origin;
  for (const s of order){ L += c(cur, s); cur = s; }
  return L;
}

// Or-opt: mueve tramos de 1..3 paradas a la mejor posición. Complementa al 2-opt
// (que solo invierte): juntos quitan casi todos los rodeos. Origen fijo, final libre.
function orOpt(origin, stops, cost){
  let route = [origin, ...stops];
  const D = (a, b) => (cost || dist)(route[a], route[b]);
  let improved = true, passes = 0;
  const MAX_PASSES = 200;
  while (improved && passes++ < MAX_PASSES){
    improved = false;
    for (let segLen = 1; segLen <= 3 && !improved; segLen++){
      for (let i = 1; i + segLen - 1 < route.length; i++){
        const j = i + segLen - 1;
        const prev = i - 1, next = (j + 1 < route.length) ? j + 1 : -1;
        const removed = D(prev, i) + (next >= 0 ? D(j, next) : 0) - (next >= 0 ? D(prev, next) : 0);
        let done = false;
        for (let pos = 0; pos < route.length; pos++){
          if (pos >= prev && pos <= j) continue;            // no en su propio hueco
          const b = (pos + 1 < route.length) ? pos + 1 : -1;
          if (b >= i && b <= j) continue;
          const added = D(pos, i) + (b >= 0 ? D(j, b) : 0) - (b >= 0 ? D(pos, b) : 0);
          if (added + 1e-9 < removed){
            const seg = route.splice(i, segLen);
            const insAt = pos < i ? pos + 1 : pos + 1 - segLen;
            route.splice(insAt, 0, ...seg);
            improved = true; done = true; break;
          }
        }
        if (done) break;
      }
    }
  }
  return route.slice(1);
}

// Búsqueda local: alterna 2-opt y Or-opt hasta que ninguno mejora.
function localSearch(origin, stops, cost){
  let s = stops, prev = Infinity;
  for (let it = 0; it < 10; it++){
    s = twoOpt(origin, s, cost);
    s = orOpt(origin, s, cost);
    const L = routeCost(origin, s, cost);
    if (L + 1e-7 >= prev) break;
    prev = L;
  }
  return s;
}

function shuffleArr(a){
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--){ const j = (Math.random() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
// NN forzando una parada concreta como primera (diversifica los arranques).
function nnFromFirst(stops, firstIdx, cost){
  const first = stops[firstIdx];
  const rest = stops.filter((_, i) => i !== firstIdx);
  return [first, ...nearestNeighbor(first, rest, cost)];
}
// Multi-arranque: búsqueda local desde varios inicios, nos quedamos el mejor.
// Todo en LOCAL sobre la matriz ya descargada → ni una llamada de red extra.
// Todas las permutaciones de un array (para rutas pequeñas).
function permute(arr){
  if (arr.length <= 1) return [arr];
  const out = [];
  for (let i = 0; i < arr.length; i++){
    const rest = arr.slice(0, i).concat(arr.slice(i + 1));
    for (const p of permute(rest)) out.push([arr[i], ...p]);
  }
  return out;
}
// Orden ÓPTIMO exacto probando todas las combinaciones. Solo para pocas paradas
// (≤8 → máx 40320 órdenes, instantáneo). Garantiza el mejor orden posible según
// la matriz de costes (carretera si está disponible).
function bruteForce(origin, stops, cost){
  let best = stops, bestL = routeCost(origin, stops, cost);
  for (const perm of permute(stops)){
    const L = routeCost(origin, perm, cost);
    if (L < bestL){ bestL = L; best = perm; }
  }
  return best;
}

function multiStart(origin, stops, cost, costEval, K){
  const ev = costEval || cost;
  if (stops.length <= 2) return polishDirectional(origin, localSearch(origin, nearestNeighbor(origin, stops, cost), cost), ev);
  if (stops.length <= 7) return bruteForce(origin, stops, ev);   // óptimo exacto, tiempo real de marcha
  let best = localSearch(origin, nearestNeighbor(origin, stops, cost), cost);
  let bestL = routeCost(origin, best, ev);
  const n = stops.length;
  const t0 = Date.now();
  const BUDGET_MS = 700;      // tope por grupo: protege móviles lentos
  const STALE = 8;            // si 8 arranques seguidos no mejoran, parar (rendimientos decrecientes)
  let stale = 0;
  for (let k = 0; k < K; k++){
    const start = (k < n) ? nnFromFirst(stops, k % n, cost) : shuffleArr(stops);
    const s = localSearch(origin, start, cost);
    const L = routeCost(origin, s, ev);
    if (L + 1e-9 < bestL){ bestL = L; best = s; stale = 0; }
    else stale++;
    if (stale >= STALE) break;
    if (Date.now() - t0 > BUDGET_MS) break;
  }
  // Pulido final sobre el coste REAL direccional (tiempo de marcha A→B). La búsqueda
  // local de arriba usa un coste simétrico promediado (converge bien en rutas largas),
  // pero deja mejoras direccionales sin hacer (p. ej. invertir dos paradas seguidas).
  // Esta pasada recalcula el coste completo en cada prueba → correcto con calles de un
  // solo sentido, donde A→B ≠ B→A. Es lo que faltaba para que el orden sea el óptimo real.
  return polishDirectional(origin, best, ev);
}

// Búsqueda local que optimiza el COSTE REAL (puede ser asimétrico: A→B ≠ B→A).
// Para que sea correcta con costes asimétricos, evalúa el coste TOTAL de la ruta en
// cada movimiento candidato (recolocaciones de 1..3 paradas + inversiones de tramo),
// en vez de usar las fórmulas de delta del 2-opt clásico (que asumen simetría).
function polishDirectional(origin, stops, ev){
  let route = stops.slice();
  let improved = true, passes = 0;
  const MAX_PASSES = 60;
  while (improved && passes++ < MAX_PASSES){
    improved = false;
    let base = routeCost(origin, route, ev);
    // 1) Recolocaciones (Or-opt) de tramos de 1..3 paradas, normal e invertido.
    for (let segLen = 1; segLen <= 3 && !improved; segLen++){
      for (let i = 0; i + segLen <= route.length && !improved; i++){
        const rest = route.slice(); const seg = rest.splice(i, segLen);
        const rev = segLen > 1 ? seg.slice().reverse() : null;
        for (let pos = 0; pos <= rest.length; pos++){
          if (pos === i) continue;                       // su sitio original
          const cand = rest.slice(); cand.splice(pos, 0, ...seg);
          const L = routeCost(origin, cand, ev);
          if (L + 1e-7 < base){ route = cand; base = L; improved = true; break; }
          if (rev){                                      // mismo hueco, tramo al revés
            const cand2 = rest.slice(); cand2.splice(pos, 0, ...rev);
            const L2 = routeCost(origin, cand2, ev);
            if (L2 + 1e-7 < base){ route = cand2; base = L2; improved = true; break; }
          }
        }
      }
    }
    if (improved) continue;
    // 2) Inversiones de tramo (2-opt), recalculando el coste completo (correcto si asimétrico).
    for (let i = 0; i < route.length - 1 && !improved; i++){
      for (let k = i + 1; k < route.length; k++){
        const cand = route.slice();
        const seg = cand.slice(i, k + 1).reverse();
        cand.splice(i, k - i + 1, ...seg);
        const L = routeCost(origin, cand, ev);
        if (L + 1e-7 < base){ route = cand; base = L; improved = true; break; }
      }
    }
  }
  return route;
}

// Reparto equilibrado: barrido angular alrededor de la salida y corte en
// grupos del mismo tamaño (cada repartidor, un "sector" con igual nº de paradas).
function sweepBalanced(origin, stops, k){
  // Centro de las paradas (no la salida): si la salida está lejos y a un lado,
  // medir el ángulo desde ella amontona todo en una franja y los sectores
  // salen como tiras que cruzan la ciudad. Desde el centro de las paradas,
  // cada sector es una porción compacta y con el mismo nº de paradas.
  const cLat = stops.reduce((s, p) => s + p.lat, 0) / stops.length;
  const cLng = stops.reduce((s, p) => s + p.lng, 0) / stops.length;
  const sorted = stops
    .map(s => ({ s, a: Math.atan2(s.lat - cLat, s.lng - cLng) }))
    .sort((x, y) => x.a - y.a)
    .map(o => o.s);
  const n = sorted.length, base = Math.floor(n / k), extra = n % k;
  const clusters = []; let idx = 0;
  for (let i = 0; i < k; i++){
    const size = base + (i < extra ? 1 : 0);
    if (size > 0){ clusters.push(sorted.slice(idx, idx + size)); idx += size; }
  }
  return clusters.filter(c => c.length);
}

function clusterStops(origin, stopCoords, k, mdist){
  k = Math.max(1, Math.min(k, stopCoords.length));  // nunca más grupos que paradas
  if (k <= 1) return [stopCoords.slice()];
  const hasM = mdist && mdist !== dist;
  if (balanceStops) return hasM ? balancedByRoad(origin, stopCoords, k, mdist)  // equilibrado: zonas compactas + nº parejo
                                : sweepBalanced(origin, stopCoords, k);          // sin matriz: barrido geométrico
  return hasM ? kmedoids(stopCoords, k, mdist)      // zonas: compacto por carretera si hay matriz
              : kmeans(stopCoords, k);              // si no, por cercanía geográfica
}

// Medoide de un grupo: la parada que minimiza la suma de distancias (D) a las demás.
function medoidOf(group, D){
  let bestM = group[0], bestSum = Infinity;
  for (const a of group){ let s = 0; for (const b of group) s += D(a, b); if (s < bestSum){ bestSum = s; bestM = a; } }
  return bestM;
}
// Equilibrado POR CARRETERA: parte de zonas compactas (k-medoids) y reequilibra suave
// moviendo solo paradas de BORDE (las más cercanas al grupo deficitario) hasta que los
// tamaños quedan parejos (máx − mín ≤ 1). Combina zonas limpias y nº de paradas igualado.
function balancedByRoad(origin, stops, k, D){
  let clusters = kmedoids(stops, k, D);
  if (clusters.length < 2) return clusters;
  let meds = clusters.map(c => medoidOf(c, D));
  let guard = 0;
  const MAX = stops.length * 4;
  while (guard++ < MAX){
    let big = 0, small = 0;
    clusters.forEach((c, i) => { if (c.length > clusters[big].length) big = i; if (c.length < clusters[small].length) small = i; });
    if (clusters[big].length - clusters[small].length <= 1) break;   // ya equilibrado (floor/ceil)
    // de 'big', la parada más cercana al medoide del grupo deficitario → mover ahí
    let bi = 0, bd = Infinity;
    clusters[big].forEach((p, idx) => { const d = D(meds[small], p); if (d < bd){ bd = d; bi = idx; } });
    clusters[small].push(clusters[big].splice(bi, 1)[0]);
    meds[big] = medoidOf(clusters[big], D);
    meds[small] = medoidOf(clusters[small], D);
  }
  return clusters.filter(c => c.length);
}

// Coste de un repartidor: ordena con 'cost' (simétrico, estable) pero MIDE con 'ev'
// (tiempo real direccional) → el reparto se decide sobre el tiempo de marcha real.
function clusterCost(origin, cluster, cost, ev){
  if (!cluster.length) return 0;
  const ordered = localSearch(origin, nearestNeighbor(origin, cluster, cost), cost);
  return routeCost(origin, ordered, ev || cost);
}
// Mejora del reparto entre repartidores sobre la matriz ya descargada (sin red extra):
//  · sin equilibrar → mover una parada a otro repartidor o intercambiar dos, si baja el total.
//  · equilibrado    → solo intercambios (mantiene el mismo nº de paradas por repartidor).
function improveAssignment(origin, clusters, cost, balanced, ev, loArg, hiArg){
  let R = clusters.map(c => c.slice());
  let lens = R.map(c => clusterCost(origin, c, cost, ev));
  // Banda de tamaños para el paso de MOVER paradas (modo sin equilibrar): impide que un
  // repartidor acapare casi todo y otros queden con migajas. Sin esto, minimizar km
  // totales de rutas abiertas premia amontonar en uno. Si quien llama pasa lo/hi, se usan
  // esos límites; si no, una banda por defecto alrededor de la media.
  const nTot = R.reduce((s, c) => s + c.length, 0);
  const avg = nTot / R.length;
  const minSize = (typeof loArg === 'number') ? loArg : Math.max(1, Math.floor(avg * 0.6));
  const maxSize = (typeof hiArg === 'number') ? hiArg : Math.ceil(avg * 1.5);
  let improved = true, guard = 0;
  const MAX_PASSES = 200;
  while (improved && guard++ < MAX_PASSES){
    improved = false;
    if (!balanced){
      for (let i = 0; i < R.length && !improved; i++){
        if (R[i].length <= 1 || R[i].length - 1 < minSize) continue;   // no vaciar ni bajar de la banda
        for (let si = 0; si < R[i].length && !improved; si++){
          for (let j = 0; j < R.length && !improved; j++){
            if (i === j || R[j].length + 1 > maxSize) continue;          // no pasar de la banda
            const ni = R[i].filter((_, x) => x !== si);
            const nj = R[j].concat([R[i][si]]);
            const li = clusterCost(origin, ni, cost, ev), lj = clusterCost(origin, nj, cost, ev);
            if (li + lj + 1e-6 < lens[i] + lens[j]){
              R[i] = ni; R[j] = nj; lens[i] = li; lens[j] = lj; improved = true;
            }
          }
        }
      }
    }
    if (!improved){
      for (let i = 0; i < R.length && !improved; i++){
        for (let j = i + 1; j < R.length && !improved; j++){
          for (let a = 0; a < R[i].length && !improved; a++){
            for (let b = 0; b < R[j].length && !improved; b++){
              const ci = R[i].slice(), cj = R[j].slice();
              const tmp = ci[a]; ci[a] = cj[b]; cj[b] = tmp;
              const li = clusterCost(origin, ci, cost, ev), lj = clusterCost(origin, cj, cost, ev);
              if (li + lj + 1e-6 < lens[i] + lens[j]){
                R[i] = ci; R[j] = cj; lens[i] = li; lens[j] = lj; improved = true;
              }
            }
          }
        }
      }
    }
  }
  return R.filter(c => c.length);
}

// Matriz de tiempos/distancias reales por carretera (OSRM /table). Una sola
// llamada con TODAS las paradas: sirve para repartir y para ordenar cada ruta.
// El servidor gratuito falla a veces de forma intermitente, así que reintentamos
// un par de veces antes de rendirnos (si no, caeríamos a línea recta y el orden
// saldría peor por carretera).
async function fetchTable(pts){
  if (pts.length < 2) return null;
  // 1) OSRM (tu servidor; por defecto público para validar) — PRINCIPAL.
  const path = pts.map(c => `${c.lng},${c.lat}`).join(';');
  const url = `${OSRM_BASE}/table/v1/driving/${path}?annotations=duration,distance`;
  for (let attempt = 0; attempt < 3; attempt++){
    try {
      const r = await fetchT(url, 8000);
      const d = await r.json();
      if (d.code === 'Ok' && (d.durations || d.distances)){ srvState.route = 'ok'; return { dur: d.durations || null, dist: d.distances || null }; }
    } catch {}
    if (attempt < 2) await new Promise(res => setTimeout(res, 400)); // breve espera y reintento
  }
  // 2) LocationIQ (matriz = 1 llamada) — RESPALDO.
  const lm = await liqMatrix(pts);
  if (lm){ srvState.route = 'fallback'; return lm; }
  return null;
}
// Motor MONOFÁSICO: inserción en paralelo con cupo. Construye las k rutas A LA VEZ
// (reparto + orden juntos, no en dos fases): cada parada entra en el repartidor y la
// posición donde MENOS coste real añade, respetando un cupo por repartidor.
//  · cupo ajustado  (equilibrado) → nº de paradas casi igual.
//  · cupo holgado   (por zonas)   → zonas compactas, números algo desiguales, sin colapsar.
function parallelInsertion(origin, stops, k, ev, cap){
  const routes = Array.from({ length: k }, () => []);
  // Semillas separadas geográficamente (una por repartidor) para que no arranquen todos
  // en el mismo sitio. Farthest-first: la más lejana de la salida y luego entre sí.
  const seeds = [];
  let f0 = stops[0], d0 = -1;
  stops.forEach(s => { const d = dist(origin, s); if (d > d0){ d0 = d; f0 = s; } });
  seeds.push(f0);
  while (seeds.length < k && seeds.length < stops.length){
    let best = null, bd = -1;
    for (const s of stops){
      if (seeds.includes(s)) continue;
      let d = Infinity; for (const q of seeds) d = Math.min(d, dist(s, q));
      if (d > bd){ bd = d; best = s; }
    }
    if (!best) break;
    seeds.push(best);
  }
  seeds.forEach((s, i) => routes[i].push(s));
  const rem = stops.filter(s => !seeds.includes(s));
  // Coste de meter 's' en una ruta = (detour de inserción) + (anclaje a la zona). El
  // anclaje = distancia a la parada más cercana que la ruta YA tiene. Sin él, las paradas
  // junto al depósito tienen detour ~0 en CUALQUIER ruta (abiertas) y se mezclarían entre
  // zonas; con él, cada parada se va a la ruta cuya zona le queda más cerca.
  for (const s of rem){
    let best = null;     // { ri, pos, score }
    for (let ri = 0; ri < k; ri++){
      if (routes[ri].length >= cap) continue;          // cupo lleno → no más aquí
      const r = routes[ri];
      let detour = Infinity;
      for (let pos = 0; pos <= r.length; pos++){
        const a = pos === 0 ? origin : r[pos - 1];
        const b = pos < r.length ? r[pos] : null;
        const delta = b ? (ev(a, s) + ev(s, b) - ev(a, b)) : ev(a, s);
        if (delta < detour) detour = delta;
      }
      let anchor = Infinity;                            // distancia a la parada más cercana de la ruta
      for (const m of r){ const d = ev(s, m); if (d < anchor) anchor = d; }
      const score = detour + (anchor === Infinity ? 0 : anchor);
      if (!best || score < best.score) best = { ri, score };
    }
    if (!best){                                        // todos al cupo (redondeo) → al menos lleno
      let ri = 0; for (let i = 1; i < k; i++) if (routes[i].length < routes[ri].length) ri = i;
      routes[ri].push(s);
      continue;
    }
    // mejor POSICIÓN dentro de la ruta elegida (orden), por detour real
    const r = routes[best.ri]; let bestPos = r.length, bd2 = Infinity;
    for (let pos = 0; pos <= r.length; pos++){
      const a = pos === 0 ? origin : r[pos - 1];
      const b = pos < r.length ? r[pos] : null;
      const delta = b ? (ev(a, s) + ev(s, b) - ev(a, b)) : ev(a, s);
      if (delta < bd2){ bd2 = delta; bestPos = pos; }
    }
    r.splice(bestPos, 0, s);
  }
  return routes.filter(r => r.length);
}

// Resuelve el reparto + el orden de cada repartidor.
async function solveRoutes(origin, stopCoords, k){
  let cost = dist;        // coste para los MOVIMIENTOS del heurístico (rutas grandes)
  let costEval = dist;    // coste para EVALUAR/ELEGIR el orden (tiempo real en el sentido de marcha)
  let mdist = dist;       // distancia para el CLUSTERING (por carretera si hay matriz)
  if (roadOpt && payMode){
    const pts = [origin, ...stopCoords];
    const T = await fetchTable(pts);                   // ← matriz por carretera (una sola llamada)
    // Modo Distancia: usa la matriz de DISTANCIAS reales si existe; si el proveedor no
    // las da (p. ej. LocationIQ suele dar solo tiempos), NO falseamos con tiempos →
    // dejamos M=null y el modo Distancia optimiza por línea recta (distancia de verdad).
    // Modo Tiempo: usa la matriz de tiempos (o distancias si faltan tiempos).
    const M = T && ((optMode === 'distance') ? (T.dist || null) : (T.dur || T.dist));
    if (M){
      pts.forEach((p, idx) => p._mi = idx);
      // Factor coherente para celdas ausentes: media de (valor matriz / km línea recta).
      // Así el respaldo va en las MISMAS unidades que la matriz (segundos o metros), en
      // vez de mezclar con metros de línea recta como antes.
      let acc = 0, cnt = 0;
      for (let i = 0; i < pts.length; i++) for (let j = 0; j < pts.length; j++){
        if (i === j) continue;
        const v = M[i] && M[i][j], dd = dist(pts[i], pts[j]);
        if (typeof v === 'number' && dd > 0){ acc += v / dd; cnt++; }
      }
      const perDist = cnt ? acc / cnt : 1000;
      // Evaluación: coste REAL en el sentido de marcha A→B (no promediamos: en calles
      // de un solo sentido A→B y B→A difieren y promediar elige peor).
      costEval = (a, b) => {
        const v = M[a._mi] && M[a._mi][b._mi];
        return (typeof v === 'number') ? v : dist(a, b) * perDist;
      };
      // Movimientos del heurístico (2-opt/Or-opt invierten tramos): ahí conviene un
      // coste simétrico para que converjan bien. Solo se usa en rutas largas (>7).
      cost = (a, b) => {
        const x = a._mi, y = b._mi;
        const v1 = M[x] && M[x][y], v2 = M[y] && M[y][x];
        const vals = [v1, v2].filter(v => typeof v === 'number');
        return vals.length ? (vals.reduce((s, n) => s + n, 0) / vals.length) : dist(a, b) * perDist;
      };
      mdist = cost;   // clustering por carretera (simétrico)
    }
  }
  const clusters = clusterStops(origin, stopCoords, k, mdist);   // método actual (dos fases)
  const orderClusters = cls => cls.map(c => multiStart(origin, c, cost, costEval, Math.min(40, c.length + 12)));
  if (clusters.length <= 1) return orderClusters(clusters);      // un repartidor: sin reparto
  const sum = rs => rs.reduce((a, r) => a + routeCost(origin, r, costEval), 0);
  const n = stopCoords.length;

  // BANDA de tamaños del modo:
  //  · equilibrado → estrecha (números casi iguales).
  //  · por zonas   → suelo BAJO (solo para que nadie quede con 1-2 paradas) y techo alto:
  //    prioriza MENOS km aunque un repartidor lleve bastantes más (lo que pediste).
  const zLo = Math.max(2, Math.round((n / k) * 0.35));
  const lo = balanceStops ? Math.max(1, Math.floor(n / k) - 1) : zLo;
  const hi = balanceStops ? Math.ceil(n / k)                   : (n - (k - 1) * zLo);
  const valid = sol => sol.every(r => r.length >= lo && r.length <= hi);

  // Pule las FRONTERAS de un reparto: mueve/intercambia paradas entre repartidores si baja
  // el km/tiempo real (respetando la banda). Es lo que quita las paradas "cruzadas" (una
  // parada de un repartidor metida en la zona de otro). Se aplica a TODOS los candidatos.
  const polish = a => improveAssignment(origin, a, cost, balanceStops, costEval, lo, hi);

  // Repartos base, cada uno pulido en fronteras y luego ordenado.
  const bases = [ clusters,                                                  // dos fases (semilla, ya calculada)
                  parallelInsertion(origin, stopCoords, k, costEval, Math.ceil(n / k)) ]; // inserción ajustada
  if (!balanceStops){
    const capLoose = Math.min(hi, Math.ceil((n / k) * 1.5));                  // inserción holgada (zonas)
    bases.push(parallelInsertion(origin, stopCoords, k, costEval, capLoose));
  }
  const candidates = [];
  for (const a of bases){
    if (!a || !a.length) continue;
    candidates.push(orderClusters(a));            // sin pulir (por si ya es bueno)
    candidates.push(orderClusters(polish(a)));    // pulido de fronteras (move + swap)
  }
  // Nos quedamos el más corto DE ENTRE LOS VÁLIDOS (dentro de la banda). Si ninguno
  // cumpliera (raro), caemos al más corto sin filtro como último recurso.
  const pool = candidates.filter(valid);
  const finalists = pool.length ? pool : candidates;
  let best = finalists[0], bestL = sum(best);
  for (let i = 1; i < finalists.length; i++){ const L = sum(finalists[i]); if (L < bestL){ best = finalists[i]; bestL = L; } }
  return best;
}

function setOptBusy(msgKey){
  const btn = document.getElementById('btn-opt');
  btn.innerHTML = '<span class="spinning">⟳</span>&nbsp; ' + t(msgKey);
  const ov = document.getElementById('opt-overlay');
  const msg = document.getElementById('opt-overlay-msg');
  if (msg) msg.textContent = t(msgKey);
  if (ov) ov.classList.add('show');
}
function hideOptOverlay(){
  const ov = document.getElementById('opt-overlay');
  if (ov) ov.classList.remove('show');
}

async function optimizeRoute() {
  const stopInputs = Array.from(document.querySelectorAll('.stop-input')).filter(i => i.value.trim());
  if (stopInputs.length < 2) { alert(t('min2')); return; }
  document.querySelectorAll('.stop-input.invalid, #origin.invalid').forEach(el => el.classList.remove('invalid'));
  const btn = document.getElementById('btn-opt');
  btn.disabled = true; optBusy = true;
  setOptBusy('geocoding');
  const finishIdle = () => { btn.disabled = false; optBusy = false; renderOptBtn(); hideOptOverlay(); };

  const originInput = document.getElementById('origin');
  const originCoord = await resolveCoord(originInput);
  if (!originCoord) { originInput.classList.add('invalid'); const orow = originInput.closest('.origin-row'); if (orow) orow.classList.remove('filled'); alert(t('originFail')); finishIdle(); return; }
  if (isFinite(originCoord.lat) && isFinite(originCoord.lng)) searchBias = { lat: originCoord.lat, lon: originCoord.lng };
  // Recuerda este origen como "el último usado" para proponerlo la próxima vez.
  lsSet(LS_DEPOT, { v: originInput.value.trim(), c: { lat: originCoord.lat, lng: originCoord.lng }, num: rowNumber(originInput) });

  setOptBusy('calcRoute');
  // Geocodifica EN PARALELO con un límite de concurrencia (pool de "trabajadores").
  // Mucho más rápido que de una en una; el límite (4) evita ráfagas que bloqueen
  // al proveedor, y si uno no responde se salta solo (liqSkipUntil).
  const stopCoords = [], failedInputs = [];
  {
    const results = new Array(stopInputs.length);
    let next = 0, done = 0;
    const ovMsg = document.getElementById('opt-overlay-msg');
    const showProgress = () => { if (ovMsg) ovMsg.textContent = t('geocoding') + ' ' + done + '/' + stopInputs.length; };
    showProgress();
    const worker = async () => {
      for (;;) {
        const i = next++;
        if (i >= stopInputs.length) return;
        try { results[i] = await resolveCoord(stopInputs[i]); } catch { results[i] = null; }
        done++; showProgress();
      }
    };
    const CONC = Math.min(4, stopInputs.length);
    await Promise.all(Array.from({ length: CONC }, worker));
    stopInputs.forEach((inp, i) => { if (results[i]) stopCoords.push(results[i]); else failedInputs.push(inp); });
  }

  if (failedInputs.length) {
    // Las marca en rojo para que puedas corregirlas, y pregunta si seguir con el resto.
    failedInputs.forEach(inp => { inp.classList.add('invalid'); const r = inp.closest('.stop-row'); if (r) r.classList.remove('filled'); });
    const ok = confirm(t('someFailHead') + '\n\n• ' + failedInputs.map(i => i.value.trim()).join('\n• ') + '\n\n' + t('continueRest'));
    if (!ok || stopCoords.length < 2) {
      try { failedInputs[0].scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch {}
      finishIdle();
      return;
    }
  }

  // Reparte las paradas entre los repartidores y optimiza la ruta de cada uno
  // desde la misma salida. Reparto: equilibrado (mismo nº) o por zonas. Orden:
  // por carretera (OSRM) si está activado, o en línea recta.
  const k = Math.min(couriers, stopCoords.length);
  if (roadOpt && payMode) setOptBusy('calcReal');
  const orderedClusters = await solveRoutes(originCoord, stopCoords, k);
  const routes = orderedClusters.map(ord => {
    let prev = originCoord, total = 0;
    const stops = ord.map(s => {
      const d = dist(prev, s); prev = s; total += d;
      const { _mi, ...clean } = s;                 // descarta el índice interno de la matriz
      return { ...clean, fromPrev: d };
    });
    return { stops, total };
  });
  routes.sort((a, b) => b.stops.length - a.stops.length);

  if (routes.some(r => r.stops.some(s => s.fromPrev > 100))) alert(t('farWarn'));

  optimizedAddresses = []; optimizedCoords = [];
  lastResult = { originCoord, routes };
  activeCourier = 0;
  mapShowAll = true;

  const panel = document.getElementById('result-panel');
  try {
    panel.classList.add('on');
    renderResult(true);                            // muestra la ruta al instante
    pushRecent(snapshot());
    lsSet(LS_LAST, snapshot());                    // guardado inmediato (sobrevive a un refresh)
    if (window.innerWidth <= 720) setMobileView('route');
    else panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } finally {
    finishIdle();                                  // el botón se reactiva pase lo que pase
  }
  enhanceAll().then(() => { renderResult(false); lsSet(LS_LAST, snapshot()); });  // ruta real por carretera, en segundo plano (y se persiste)
}

// Rough drive-time estimate from straight-line distance (road factor ~1.4, ~30 km/h urban).
function estimateMinutes(km){ return Math.round(km * 1.4 / 30 * 60); }
function fmtTime(mins){
  if (mins < 1) return '< 1 ' + t('unitMin');
  if (mins < 60) return mins + ' ' + t('unitMin');
  const h = Math.floor(mins / 60), m = mins % 60;
  return h + ' h' + (m ? ' ' + m + ' ' + t('unitMin') : '');
}

function esc(s){ return (s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

// Render the result panel from lastResult (also used when switching language).
function renderResult(fit){
  if (!lastResult || !lastResult.routes) return;
  const { originCoord, routes } = lastResult;
  const multi = routes.length > 1;
  if (activeCourier >= routes.length || activeCourier < 0) activeCourier = 0;

    const color = courierColor(ci);
    const stops = Array.isArray(r.stops) ? r.stops : [];
    const km = routeKm(r).toFixed(1);
    const mins = routeMin(r);
    const stats = `<div class="stats">
        <div class="stat"><div class="stat-label">${t('distTotal')}</div><div class="stat-value">${km}<span class="stat-unit"> ${t('unitKm')}</span></div></div>

    list += `<div class="route-stops" data-ci="${ci}">`;
    stops.forEach((s, i) => {
      const fp = (typeof s.fromPrev === 'number' && isFinite(s.fromPrev)) ? s.fromPrev : 0;
      const note = s.approx
        ? `<div class="route-dist" style="color:var(--blue-dark)">${t('approxNote')}</div>`
        : `<div class="route-dist">${t('fromPrev', { d: fp.toFixed(2) })}</div>`;
      const doneCls = s.done ? ' done' : '';
      const isNext = !s.done && stops.findIndex(x => !x.done) === i; // primera pendiente
      const nextCls = isNext ? ' next' : '';
      list += `<div class="route-item sortable-item${doneCls}" data-si="${i}"><div class="route-badge" style="background:${color}">${i + 1}</div><div class="route-info"><div class="route-name">${esc(s.address)}</div>${note}</div><button class="done-check${s.done ? ' on' : ''}${nextCls}" onclick="toggleDone(${ci},${i})" title="${t('markDone')}" aria-label="${t('markDone')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="5 12 10 17 19 7"/></svg></button><button class="nav-go" title="${t('navGo')}" aria-label="${t('navGo')}" onclick="openStopNav(${ci},${i})"><svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg></button><button class="sort-handle" aria-label="↕"><svg viewBox="0 0 24 24" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg></button></div>`;
    });
    list += `</div></div>`;
    const actions = `<div class="result-actions">
        <div class="nav-hint">${t('navHint')}</div>
        <div class="share-row">
          <button class="share-btn wa" onclick="shareWhatsApp(${ci})" title="WhatsApp" aria-label="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.7.9-.3.2-.5.1a6.5 6.5 0 01-1.9-1.2 7.2 7.2 0 01-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4c0-.1-.5-1.3-.7-1.7s-.4-.4-.5-.4h-.5a1 1 0 00-.7.3 3 3 0 00-.9 2.2 5.2 5.2 0 001.1 2.7 11.8 11.8 0 004.5 4 5 5 0 002.2.4 2.7 2.7 0 001.8-1.3 2.2 2.2 0 00.2-1.2c-.1-.1-.3-.2-.5-.3z"/></svg></button>
          <button class="share-btn mail" onclick="shareEmail(${ci})" title="${t('mailLabel')}" aria-label="${t('mailLabel')}"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></button>
          <button class="share-btn copy" onclick="copyLink(${ci})" title="${t('copyLink')}" aria-label="${t('copyLink')}"><svg viewBox="0 0 24 24" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg></button>
          <button class="share-btn qr" onclick="shareQR(${ci})" title="${t('shareQR')}" aria-label="${t('shareQR')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M14 21h.01M21 21v.01M21 17v.01M17 21v.01"/></svg></button>
        </div>
      </div>`;
    return `${stats}${list}${actions}`;
  });

  let html;
  if (multi){
    const layersSvg = '<svg viewBox="0 0 24 24" stroke-width="2" style="width:15px;height:15px"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>';
    let tabs = `<button class="courier-tab all${mapShowAll ? ' active' : ''}" onclick="showAllRoutes()">${layersSvg}${t('allRoutes')}<span class="ct-count">${routes.length}</span></button>`;
    tabs += routes.map((r, ci) => {
      const color = courierColor(ci);
      const n = (Array.isArray(r.stops) ? r.stops : []).length;
      const active = !mapShowAll && ci === activeCourier;
      return `<button class="courier-tab${active ? ' active' : ''}" style="--tab:${color}" onclick="setActiveCourier(${ci})"><span class="ct-dot" style="background:${color}"></span>${t('courier')} ${ci + 1}<span class="ct-count">${n}</span></button>`;
    }).join('');

    let body;
    if (mapShowAll){
      // Vista «Todos»: totales + lista de repartidores (tocar uno salta a su ruta)
      const sumKm = routes.reduce((a, r) => a + routeKm(r), 0).toFixed(1);
      const totalStops = routes.reduce((a, r) => a + (Array.isArray(r.stops) ? r.stops.length : 0), 0);
      const ovStats = `<div class="stats">
          <div class="stat"><div class="stat-label">${t('distTotal')}</div><div class="stat-value">${sumKm}<span class="stat-unit"> ${t('unitKm')}</span></div></div>
          <div class="stat"><div class="stat-label">${t('couriers')}</div><div class="stat-value">${routes.length}</div></div>
          <div class="stat"><div class="stat-label">${t('stopsLabel')}</div><div class="stat-value">${totalStops}</div></div>
        </div>`;
      const chev = '<svg viewBox="0 0 24 24" stroke-width="2" class="ov-chev"><path d="M9 6l6 6-6 6"/></svg>';
      const rows = routes.map((r, ci) => {
        const color = courierColor(ci);
        const n = (Array.isArray(r.stops) ? r.stops : []).length;
        const km = routeKm(r).toFixed(1);
        return `<button class="ov-row" onclick="setActiveCourier(${ci})"><span class="ct-dot" style="background:${color}"></span><span class="ov-name">${t('courier')} ${ci + 1}</span><span class="ov-meta">${km} ${t('unitKm')} · ${t('stopsN', { n })}</span>${chev}</button>`;
      }).join('');
      body = ovStats + `<div class="overview-list">${rows}</div>`;
    } else {
      body = blocks[activeCourier];
    }
    html = `<div class="courier-tabs">${tabs}</div>` + body;
  } else {
    html = blocks[0];
  }
  document.getElementById('routes-container').innerHTML = html;

  if (multi){
    requestAnimationFrame(() => {
      const tabsEl = document.querySelector('.courier-tabs');
      const activeTab = tabsEl && tabsEl.querySelector('.courier-tab.active');
      if (tabsEl && activeTab){
        const cr = tabsEl.getBoundingClientRect(), ar = activeTab.getBoundingClientRect();
        tabsEl.scrollLeft += (ar.left - cr.left) - (cr.width - ar.width) / 2;
      }
    });
  }

  try { setupSort(); } catch (e) { console.warn('sort setup', e); }
  try { renderMap(fit); } catch (e) { console.warn('map render', e); }
  try { renderNextBar(); } catch (e) { console.warn('next bar', e); }
}

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:15px;height:15px"><polyline points="5 12 10 17 19 7"/></svg>';
function nextStopIndex(ci){
  const r = lastResult && lastResult.routes && lastResult.routes[ci];
  if (!r || !Array.isArray(r.stops)) return -1;
  return r.stops.findIndex(s => !s.done);
}
function updateStopRow(ci, i){
  const item = document.querySelector(`.route-stops[data-ci="${ci}"] .sortable-item[data-si="${i}"]`);
  if (!item || !lastResult.routes[ci]) return;
  const done = !!lastResult.routes[ci].stops[i].done;
  item.classList.toggle('done', done);
  const chk = item.querySelector('.done-check');
  if (chk){ chk.classList.toggle('on', done); if (done) chk.classList.remove('next'); }
  if (done){
    // Efecto al completar: destello verde en la fila + "pop" del check.
    item.classList.remove('flash'); void item.offsetWidth; item.classList.add('flash');
    if (chk){ chk.classList.remove('pop'); void chk.offsetWidth; chk.classList.add('pop'); }
    setTimeout(() => { item.classList.remove('flash'); if (chk) chk.classList.remove('pop'); }, 700);
  }
}
// Mueve el resaltado "siguiente" (pulso) a la primera parada pendiente de la lista.
function refreshNextHighlight(ci){
  const cont = document.querySelector(`.route-stops[data-ci="${ci}"]`);
  if (!cont || !lastResult.routes[ci]) return;
  cont.querySelectorAll('.done-check.next').forEach(e => e.classList.remove('next'));
  const fp = lastResult.routes[ci].stops.findIndex(s => !s.done);
  if (fp >= 0){
    const item = cont.querySelector(`.sortable-item[data-si="${fp}"]`);
    const chk = item && item.querySelector('.done-check');
    if (chk && !chk.classList.contains('on')) chk.classList.add('next');
  }
}
function toggleDone(ci, i){
  const r = lastResult && lastResult.routes && lastResult.routes[ci];
  if (!r || !r.stops[i]) return;
  r.stops[i].done = !r.stops[i].done;
  updateStopRow(ci, i);
  refreshNextHighlight(ci);
  try { renderMap(false); } catch {}
  renderNextBar();
  saveState();
}
function markNextDone(){
  const ci = activeCourier, i = nextStopIndex(ci);
  if (i < 0) return;
  lastResult.routes[ci].stops[i].done = true;
  updateStopRow(ci, i);
  refreshNextHighlight(ci);
  try { renderMap(false); } catch {}
  renderNextBar();
  saveState();
}
function navNext(){
  const ci = activeCourier, i = nextStopIndex(ci);
  if (i >= 0) openStopNav(ci, i);
}
function resetDeliveries(){
  const r = lastResult && lastResult.routes && lastResult.routes[activeCourier];
  if (!r) return;
  r.stops.forEach((s, i) => { if (s.done){ s.done = false; updateStopRow(activeCourier, i); } });
  refreshNextHighlight(activeCourier);
  try { renderMap(false); } catch {}
  renderNextBar();
  saveState();
}
function renderNextBar(){
  const bar = document.getElementById('next-bar');
  if (!bar) return;
  if (!lastResult || !lastResult.routes || !document.getElementById('result-panel').classList.contains('on')){
    bar.classList.remove('show'); bar.innerHTML = ''; return;
  }
  const ci = activeCourier;
  const r = lastResult.routes[ci];
  if (!r || !r.stops.length || (mapShowAll && lastResult.routes.length > 1)){ bar.classList.remove('show'); bar.innerHTML = ''; return; }
  const total = r.stops.length;
  const doneN = r.stops.filter(s => s.done).length;
  const i = nextStopIndex(ci);
  const navSvg = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>';
  if (i < 0){
    bar.innerHTML = `<div class="nb-info nb-done">${CHECK_SVG}<span>${t('routeDone')}</span></div>`
      + `<button class="nb-reset" onclick="resetDeliveries()" title="${t('resetDeliv')}" aria-label="${t('resetDeliv')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3M3 3v4h4"/></svg></button>`;
  } else {
    const s = r.stops[i];
    bar.innerHTML = `<div class="nb-info"><span class="nb-label">${t('nextStop')} · ${doneN}/${total}</span><span class="nb-name">${i + 1}. ${esc(s.address)}</span></div>`
      + `<button class="nb-deliver" onclick="markNextDone()" title="${t('markDone')}" aria-label="${t('markDone')}">${CHECK_SVG}</button>`
      + `<button class="nb-go" onclick="navNext()" title="${t('navBtn')}" aria-label="${t('navBtn')}">${navSvg}</button>`;
  }
  bar.classList.add('show');
}
function showAllRoutes(){ mapShowAll = true; renderResult(true); }

// ── Mapa de vista previa (Leaflet) ──────────────────────────────────────────
// Teselas: OpenFreeMap (gratis, comercial, ilimitado) como capa MapLibre GL.
// Respaldo automático a OSM raster si MapLibre/plugin no carga o las teselas fallan.
function tileUrlForTheme(){
  return 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
}
function addOsmTiles(){
  return L.tileLayer(tileUrlForTheme(), {
    maxZoom: 19, attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://locationiq.com/">LocationIQ</a>'
  }).addTo(routeMap);
}
function addMapTiles(){
  const attribution = '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://openfreemap.org/">OpenFreeMap</a> · <a href="https://locationiq.com/">LocationIQ</a>';
  try {
    if (L.maplibreGL && window.maplibregl){
      const gl = L.maplibreGL({ style: 'https://tiles.openfreemap.org/styles/liberty', attribution });
      gl.addTo(routeMap);
      mapTiles = gl;
      // Si OpenFreeMap no carga en unos segundos (sin red, bloqueo…), pasamos a OSM.
      let glOk = false;
      try {
        const ml = gl.getMaplibreMap && gl.getMaplibreMap();
        if (ml && ml.on) ml.on('load', () => { glOk = true; });
      } catch (e) {}
      setTimeout(() => {
        if (!glOk && mapTiles === gl){
          try { routeMap.removeLayer(gl); } catch (e) {}
          mapTiles = addOsmTiles();
        }
      }, 6000);
      return;
    }
  } catch (e) {}
  mapTiles = addOsmTiles();   // respaldo si no hay MapLibre
}
function updateMapTiles(){
  if (!routeMap) return;
  if (mapTiles) routeMap.removeLayer(mapTiles);
  addMapTiles();
}

// Coloca flechas de sentido repartidas a lo largo de la línea, giradas según
// la dirección de avance, para que se entienda hacia dónde va la ruta.
function addRouteArrows(line, color, stopsCount){
  if (!line || line.length < 2) return;
  const seg = [];
  let total = 0;
  for (let i = 1; i < line.length; i++){
    const d = Math.hypot(line[i][0] - line[i-1][0], line[i][1] - line[i-1][1]);
    seg.push(d); total += d;
  }
  if (total <= 0) return;
  const count = Math.max(12, Math.min(Math.round((stopsCount || 6) * 3), 60)); // banda de chevrones (respaldo sin complemento)
  const step = total / (count + 1);
  let target = step, acc = 0, placed = 0;
  for (let i = 1; i < line.length && placed < count; i++){
    acc += seg[i-1];
    while (acc >= target && placed < count){
      const over = acc - target;
      const f = seg[i-1] ? (seg[i-1] - over) / seg[i-1] : 1;
      const lat = line[i-1][0] + (line[i][0] - line[i-1][0]) * f;
      const lng = line[i-1][1] + (line[i][1] - line[i-1][1]) * f;
      const ang = Math.atan2(line[i][1] - line[i-1][1], line[i][0] - line[i-1][0]) * 180 / Math.PI; // 0 = norte
      const icon = L.divIcon({
        className: '',
        html: `<div class="rt-arrow" style="color:${color};transform:rotate(${ang}deg)"><svg viewBox="0 0 24 24"><path d="M5 16 L12 7 L19 16"/></svg></div>`,
        iconSize: [16, 16], iconAnchor: [8, 8]
      });
      const m = L.marker([lat, lng], { icon, interactive: false, keyboard: false }).addTo(routeMap);
      mapLayers.push(m);
      placed++; target += step;
    }
  }
}

// Índice del vértice de la polilínea más cercano a un punto (para cortar el
// trazado real por carretera en "ya recorrido" vs "lo que queda").
function nearestVertexIdx(line, lat, lng){
  let bi = 0, bd = Infinity;
  for (let i = 0; i < line.length; i++){
    const dy = line[i][0] - lat, dx = line[i][1] - lng, d = dy*dy + dx*dx;
    if (d < bd){ bd = d; bi = i; }
  }
  return bi;
}

function renderMap(fit){
  if (typeof L === 'undefined' || !lastResult || !lastResult.routes) return;
  const el = document.getElementById('route-map');
  if (!el) return;
  if (!routeMap){
    routeMap = L.map(el, { zoomControl: true });
    routeMap.attributionControl.setPrefix(false); // quita la firma "Leaflet"; deja el crédito de OpenStreetMap
    addMapTiles();
  }
  mapLayers.forEach(l => routeMap.removeLayer(l));
  mapLayers = [];

  const { originCoord, routes } = lastResult;
  const multi = routes.length > 1;
  const validLL = c => c && isFinite(c.lat) && isFinite(c.lng);
  const pts = [];
  if (validLL(originCoord)){
    const homeIcon = L.divIcon({ className: '', html: '<div class="mk mk-home">⌂</div>', iconSize: [26,26], iconAnchor: [13,13] });
    const dm = L.marker([originCoord.lat, originCoord.lng], { icon: homeIcon, title: originCoord.address }).addTo(routeMap);
    mapLayers.push(dm); pts.push([originCoord.lat, originCoord.lng]);
  }

  routes.forEach((r, ci) => {
    if (multi && !mapShowAll && ci !== activeCourier) return; // solo la ruta del repartidor activo
    const color = courierColor(ci);
    const allStops = Array.isArray(r.stops) ? r.stops : [];
    const stops = allStops.filter(validLL);
    const line = r.geometry && r.geometry.length
      ? r.geometry
      : [...(validLL(originCoord) ? [[originCoord.lat, originCoord.lng]] : []), ...stops.map(s => [s.lat, s.lng])];

    if (line.length > 1){
      // Corte: lo recorrido (hasta la última entregada) se dibuja tenue/punteado;
      // lo que queda, en color y grosor normal, para que destaque a dónde ir.
      const firstPending = allStops.findIndex(s => !s.done);
      let splitIdx;
      if (firstPending === 0) splitIdx = 0;                         // nada entregado → todo activo
      else if (firstPending === -1) splitIdx = line.length - 1;     // todo entregado → todo tenue
      else if (r.geometry && r.geometry.length){
        const cur = allStops[firstPending - 1];
        splitIdx = validLL(cur) ? nearestVertexIdx(line, cur.lat, cur.lng) : 0;
      } else {
        splitIdx = firstPending;                                    // línea recta: el índice coincide
      }
      const passed = line.slice(0, splitIdx + 1);
      const remaining = line.slice(splitIdx);
      if (passed.length > 1){
        mapLayers.push(L.polyline(passed, { color, weight: 3, opacity: 0.25, dashArray: '1 7', lineCap: 'round', lineJoin: 'round' }).addTo(routeMap));
      }
      if (remaining.length > 1){
        mapLayers.push(L.polyline(remaining, { color, weight: 4, opacity: 0.9, lineCap: 'round', lineJoin: 'round' }).addTo(routeMap));
      }
    }

    stops.forEach((s, i) => {
      const done = !!s.done;
      const bg = done ? 'var(--green-deep)' : color;
      const inner = done ? '\u2713' : (i + 1);
      const icon = L.divIcon({ className: '', html: `<div class="mk${done ? ' mk-done' : ''}" style="background:${bg}">${inner}</div>`, iconSize: [24,24], iconAnchor: [12,12] });
      const m = L.marker([s.lat, s.lng], { icon, title: s.address }).addTo(routeMap);
      mapLayers.push(m); pts.push([s.lat, s.lng]);
    });
  });

  lastPts = pts;
  if (pts.length && (fit || !routeMap._loaded)) routeMap.fitBounds(pts, { padding: [28, 28], maxZoom: 16, animate: false });
  setTimeout(() => routeMap.invalidateSize(), 60);
}

// Reencuadra el mapa para que se vean todas las paradas. Se usa al mostrar la
// vista de ruta (cuando el mapa ya es visible y tiene tamaño correcto) y desde
// el botón de centrar.
function fitMap(){
  if (!routeMap || !lastPts.length) return;
  routeMap.invalidateSize();
  routeMap.fitBounds(lastPts, { padding: [28, 28], maxZoom: 16, animate: true });
}

// ── Pegar lista de direcciones ──────────────────────────────────────────────
function openPaste(){
  const m = document.getElementById('paste-modal');
  document.getElementById('paste-area').value = '';
  m.classList.add('open');
  setTimeout(() => document.getElementById('paste-area').focus(), 50);
}
function closePaste(){ document.getElementById('paste-modal').classList.remove('open'); }

// Diálogo de confirmación propio (mismo estilo que el resto), devuelve una promesa.
let _confirmResolver = null;
function confirmBox(message, okKey){
  document.getElementById('confirm-title').textContent = message;
  const ok = document.getElementById('confirm-ok');
  if (ok) ok.textContent = t(okKey || 'accept');
  document.getElementById('confirm-modal').classList.add('open');
  return new Promise(res => { _confirmResolver = res; });
}
function resolveConfirm(v){
  document.getElementById('confirm-modal').classList.remove('open');
  const r = _confirmResolver; _confirmResolver = null;
  if (r) r(v);
}
function confirmPaste(){
  const lines = document.getElementById('paste-area').value.split('\n').map(l => l.trim()).filter(Boolean);
  let added = 0, li = 0;
  // Primero rellena los inputs vacíos que ya existen (p. ej. las dos filas iniciales)
  const emptyRows = Array.from(document.querySelectorAll('#stops-container .stop-row'))
    .filter(r => !r.querySelector('.stop-input').value.trim());
  for (const row of emptyRows){
    if (li >= lines.length) break;
    const { address, num } = splitNumber(lines[li++]);
    const inp = row.querySelector('.stop-input');
    const nEl = row.querySelector('.stop-num');
    inp.value = address; inp._coord = null; inp.classList.remove('invalid');
    if (nEl) nEl.value = num;
    fillRow(row);
    added++;
  }
  // Luego crea filas nuevas para el resto
  for (; li < lines.length; li++){
    if (document.querySelectorAll('#stops-container .stop-row').length >= MAX_STOPS) break;
    const { address, num } = splitNumber(lines[li]);
    addStop(address, null, num); added++;
  }
  closePaste();
  if (added) saveState();
}

// ── Distancias y trazado reales por carretera (OSRM, gratis) ────────────────
function routeKm(r){ const v = (r && r.roadKm != null) ? r.roadKm : (r && r.total); return (typeof v === 'number' && isFinite(v)) ? v : 0; }
function routeMin(r){ if (r && r.roadMin != null && isFinite(r.roadMin)) return r.roadMin; const m = estimateMinutes(r && r.total); return isFinite(m) ? m : 0; }

async function fetchRoad(coords){
  if (coords.length < 2) return null;
  // 1) OSRM (tu servidor; por defecto público para validar) — PRINCIPAL.
  const path = coords.map(c => `${c.lng},${c.lat}`).join(';');
  const url = `${OSRM_BASE}/route/v1/driving/${path}?overview=full&geometries=geojson`;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    const d = await r.json();
    if (d.code === 'Ok' && d.routes && d.routes[0]){
      const rt = d.routes[0];
      srvState.route = 'ok';
      return { km: rt.distance / 1000, min: Math.round(rt.duration / 60),
               geometry: rt.geometry.coordinates.map(([lng, lat]) => [lat, lng]) };
    }
  } catch {} finally { clearTimeout(timer); }
  // 2) LocationIQ — RESPALDO.
  const lr = await liqRoad(coords);
  if (lr){ srvState.route = 'fallback'; return lr; }
  return null;
}
async function enhanceRoad(ci, render = true){
  if (!lastResult || !lastResult.routes[ci]) return;
  const r = lastResult.routes[ci];
  const road = await fetchRoad([lastResult.originCoord, ...r.stops]);
  if (road){ r.roadKm = road.km; r.roadMin = road.min; r.geometry = road.geometry; if (render) renderResult(); }
}
async function enhanceAll(){
  if (!lastResult) return;
  await Promise.allSettled(lastResult.routes.map((r, ci) => enhanceRoad(ci, false)));
}

// ── Reordenar paradas arrastrando ───────────────────────────────────────────
function recomputeRoute(r){
  let prev = lastResult.originCoord, total = 0;
  r.stops.forEach(s => { const d = dist(prev, s); s.fromPrev = d; prev = s; total += d; });
  r.total = total;
}
async function commitOrder(ci, container){
  const order = [...container.querySelectorAll('.sortable-item')].map(el => +el.dataset.si);
  if (order.every((v, i) => v === i)) return; // sin cambios reales (un toque)
  const r = lastResult.routes[ci];
  r.stops = order.map(i => r.stops[i]);
  recomputeRoute(r);
  r.roadKm = r.roadMin = r.geometry = undefined; // invalida el trazado real hasta recalcular
  // Feedback inmediato: renumera las insignias en el sitio antes de recalcular.
  [...container.querySelectorAll('.sortable-item .route-badge')].forEach((b, i) => { b.textContent = i + 1; });
  await enhanceRoad(ci, false); // recalcula la ruta real antes de redibujar
  renderResult(false);          // un solo dibujo, sin reencuadrar el mapa
  saveState();
  updateCurrentRecent();        // mantiene el cambio en la reciente abierta
}
// Arrastre robusto: el handle solo inicia; el movimiento y el soltado se
// siguen a nivel de documento (lo más fiable en móvil).
let dragState = null;
function setupSort(){
  document.querySelectorAll('.route-stops .sort-handle').forEach(h => {
    h.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      const row = h.closest('.sortable-item');
      const container = h.closest('.route-stops');
      if (!row || !container) return;
      dragState = { row, container, ci: +container.dataset.ci, startY: e.clientY };
      row.classList.add('dragging');
      document.body.classList.add('dragging-active');
    });
  });
}
function onDragMove(e){
  if (!dragState) return;
  e.preventDefault();
  const { row, container } = dragState;
  const y = e.clientY != null ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  // La fila sigue al dedo/ratón.
  row.style.transform = `translateY(${y - dragState.startY}px)`;
  // Reordena al cruzar el punto medio de otra parada (y resetea el seguimiento).
  const items = [...container.querySelectorAll('.sortable-item:not(.dragging)')];
  for (const it of items){
    const rect = it.getBoundingClientRect();
    if (y < rect.top + rect.height / 2){
      if (row.nextElementSibling !== it){
        container.insertBefore(row, it);
        dragState.startY = y; row.style.transform = 'translateY(0)';
      }
      return;
    }
  }
  if (row !== container.lastElementChild){
    container.appendChild(row);
    dragState.startY = y; row.style.transform = 'translateY(0)';
  }
}
function onDragEnd(){
  if (!dragState) return;
  const { ci, container, row } = dragState;
  row.classList.remove('dragging');
  row.style.transform = '';
  document.body.classList.remove('dragging-active');
  dragState = null;
  commitOrder(ci, container);
}
// Listeners de documento, registrados una sola vez.
document.addEventListener('pointermove', onDragMove, { passive: false });
document.addEventListener('pointerup', onDragEnd);
document.addEventListener('pointercancel', onDragEnd);
let resizeTimer = null;
function setAppTop(){
  const tb = document.querySelector('.topbar');
  if (tb) document.documentElement.style.setProperty('--apptop', tb.offsetHeight + 'px');
}

function applyMapMin(){
  const panel = document.getElementById('result-panel');
  if (panel) panel.classList.toggle('map-min', mapMin);
  const btn = document.getElementById('map-toggle');
  if (btn) btn.title = mapMin ? t('expandMap') : t('minimizeMap');
  if (routeMap) setTimeout(() => { routeMap.invalidateSize(); if (!mapMin) fitMap(); }, 260);
}
function toggleMap(){ mapMin = !mapMin; lsSet(LS_MAPMIN, mapMin); applyMapMin(); }

// Navegación móvil: alterna entre el editor de paradas y la ruta (en vez de
// una columna larguísima). En escritorio no tiene efecto (lo controla el CSS).
function setMobileView(v){
  if (document.body.classList.contains('courier')) v = 'route'; // bloqueado en la ruta
  if (v === 'route' && !lastResult){
    const n = Array.from(document.querySelectorAll('.stop-input')).filter(i => i.value.trim()).length;
    if (n < 2){ toast(t('noRouteYet')); return; }     // aún no hay paradas suficientes
    confirmBox(t('optimizeNow')).then(ok => { if (ok) optimizeRoute(); });   // diálogo propio
    return;
  }
  mobileView = v;
  document.body.classList.toggle('mview-route', v === 'route');
  document.body.classList.toggle('mview-edit', v === 'edit');
  document.querySelectorAll('.mnav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  if (v === 'route' && routeMap) setTimeout(fitMap, 220);
}
window.addEventListener('resize', () => {
  setAppTop();
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (routeMap) routeMap.invalidateSize(); }, 150);
});
window.addEventListener('load', setAppTop);
// Vuelca el estado (incluida la ruta) justo antes de recargar/cerrar, por si el
// guardado retardado aún no había saltado. Así un pull-to-refresh nunca la pierde.
function flushState(){ if (!booting) { try { lsSet(LS_LAST, snapshot()); } catch {} } }
window.addEventListener('pagehide', flushState);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushState(); });
if (document.fonts && document.fonts.ready) document.fonts.ready.then(setAppTop);
document.addEventListener('input', e => {
  const el = e.target;
  if (el && el.classList && (el.classList.contains('stop-input') || el.id === 'origin')) el.classList.remove('invalid');
});
</script>
